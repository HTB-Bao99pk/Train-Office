<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin-layout}">
<head>
    <title>User Management</title>
</head>
<body>
<section layout:fragment="content" class="content-wrapper p-3">

    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="content-header">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div>
                <h1 class="m-0">Users / Người dùng</h1>
                <small class="text-muted">Manage system accounts</small>
            </div>
            <a th:href="@{/admin/users/create}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add User
            </a>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="row mb-3">
                <div class="col-md-3">
                    <div class="small-box bg-info">
                        <div class="inner">
                            <h3 th:text="${totalUsers ?: 0}">0</h3>
                            <p>Total Users</p>
                        </div>
                        <div class="icon"><i class="fas fa-users"></i></div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="small-box bg-success">
                        <div class="inner">
                            <h3 th:text="${activeUsers ?: 0}">0</h3>
                            <p>Active</p>
                        </div>
                        <div class="icon"><i class="fas fa-user-check"></i></div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="small-box bg-warning">
                        <div class="inner">
                            <h3 th:text="${adminUsers ?: 0}">0</h3>
                            <p>Admins</p>
                        </div>
                        <div class="icon"><i class="fas fa-user-shield"></i></div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="small-box bg-danger">
                        <div class="inner">
                            <h3 th:text="${lockedUsers ?: 0}">0</h3>
                            <p>Locked</p>
                        </div>
                        <div class="icon"><i class="fas fa-user-lock"></i></div>
                    </div>
                </div>
            </div>

            <div class="card card-outline card-primary">
                <div class="card-header">
                    <form th:action="@{/admin/users}" method="get" class="row g-2">
                        <div class="col-md-4">
                            <input type="text"
                                   name="keyword"
                                   th:value="${keyword}"
                                   class="form-control"
                                   placeholder="Search username...">
                        </div>

                        <div class="col-md-3">
                            <select name="role" class="form-select">
                                <option value="">All Roles</option>
                                <option value="ADMIN" th:selected="${role == 'ADMIN'}">ADMIN</option>
                                <option value="CUSTOMER" th:selected="${role == 'CUSTOMER'}">CUSTOMER</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <select name="status" class="form-select">
                                <option value="">All Status</option>
                                <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">ACTIVE</option>
                                <option value="LOCKED" th:selected="${status == 'LOCKED'}">LOCKED</option>
                                <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">INACTIVE</option>
                            </select>
                        </div>

                        <div class="col-md-2 d-grid">
                            <button class="btn btn-outline-primary">
                                <i class="fas fa-search"></i> Search
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card-body table-responsive p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Created At</th>
                            <th>Updated At</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.userId}">1</td>
                            <td class="fw-semibold" th:text="${user.username}">admin</td>

                            <td>
                                <span class="badge"
                                      th:classappend="${user.role.name() == 'ADMIN'} ? ' bg-danger' : ' bg-primary'"
                                      th:text="${user.role}">
                                    ADMIN
                                </span>
                            </td>

                            <td>
                                <span class="badge"
                                      th:classappend="${user.status.name() == 'ACTIVE'} ? ' bg-success' :
                                                      (${user.status.name() == 'LOCKED'} ? ' bg-danger' : ' bg-secondary')"
                                      th:text="${user.status}">
                                    ACTIVE
                                </span>
                            </td>

                            <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}">
                                01/01/2026
                            </td>
                            <td th:text="${#temporals.format(user.updatedAt, 'dd/MM/yyyy HH:mm')}">
                                01/01/2026
                            </td>

                            <td class="text-end">
                                <a th:href="@{/admin/users/{id}(id=${user.userId})}"
                                   class="btn btn-sm btn-info">
                                    <i class="fas fa-eye"></i>
                                </a>

                                <a th:href="@{/admin/users/{id}/edit(id=${user.userId})}"
                                   class="btn btn-sm btn-warning">
                                    <i class="fas fa-edit"></i>
                                </a>

                                <button type="button"
                                        class="btn btn-sm btn-danger"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#deleteModal' + ${user.userId}">
                                    <i class="fas fa-trash"></i>
                                </button>

                                <div class="modal fade"
                                     th:id="'deleteModal' + ${user.userId}"
                                     tabindex="-1">
                                    <div class="modal-dialog modal-dialog-centered">
                                        <div class="modal-content text-start">
                                            <div class="modal-header">
                                                <h5 class="modal-title">Delete User</h5>
                                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                            </div>

                                            <div class="modal-body">
                                                Delete user
                                                <strong th:text="${user.username}">admin</strong>?
                                            </div>

                                            <div class="modal-footer">
                                                <button type="button"
                                                        class="btn btn-secondary"
                                                        data-bs-dismiss="modal">
                                                    Cancel
                                                </button>

                                                <form th:action="@{/admin/users/{id}/delete(id=${user.userId})}"
                                                      method="post">
                                                    <button type="submit" class="btn btn-danger">
                                                        Delete
                                                    </button>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                No users found.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="card-footer">
                    <div th:replace="~{fragments/pagination :: pagination(${page})}"></div>
                </div>
            </div>
        </div>
    </section>
</section>
</body>
</html>
