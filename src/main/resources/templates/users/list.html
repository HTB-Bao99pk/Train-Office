<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout('Users', ~{::section}, 'users')}">
<section>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0">Users</h2>
        <a class="btn btn-primary" th:href="@{/admin/users/new}">
            <i class="fas fa-plus mr-1"></i> Add user
        </a>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-header">
            <form class="row g-2" method="get" th:action="@{/admin/users}">
                <div class="col-md-4">
                    <input class="form-control" name="keyword" th:value="${keyword}" placeholder="Search email or full name">
                </div>
                <div class="col-md-3">
                    <select class="form-control" name="role">
                        <option value="">All roles</option>
                        <option th:each="role : ${roles}"
                                th:value="${role}"
                                th:text="${role}"
                                th:selected="${role == selectedRole}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-control" name="status">
                        <option value="">All statuses</option>
                        <option th:each="status : ${statuses}"
                                th:value="${status}"
                                th:text="${status}"
                                th:selected="${status == selectedStatus}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-primary w-100" type="submit">
                        <i class="fas fa-search mr-1"></i> Search
                    </button>
                </div>
            </form>
        </div>
        <div class="card-body table-responsive p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Full name</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Created at</th>
                    <th class="text-right">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.userId}">1</td>
                    <td th:text="${user.email}">user@example.com</td>
                    <td th:text="${user.fullName}">User</td>
                    <td th:text="${user.role}">CUSTOMER</td>
                    <td th:text="${user.status}">ACTIVE</td>
                    <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                    <td class="text-right">
                        <a class="btn btn-sm btn-info" th:href="@{/admin/users/{id}(id=${user.userId})}">
                            <i class="fas fa-eye"></i>
                        </a>
                        <a class="btn btn-sm btn-warning" th:href="@{/admin/users/edit/{id}(id=${user.userId})}">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a class="btn btn-sm btn-danger"
                           th:if="${session.currentUser == null or session.currentUser.userId != user.userId}"
                           th:href="@{/admin/users/delete/{id}(id=${user.userId})}"
                           onclick="return confirm('Delete this user?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="7" class="text-center text-muted py-4">No users found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</html>
