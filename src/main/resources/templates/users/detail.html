<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout('User detail', ~{::section}, 'users')}">
<section>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0">User detail</h2>
        <div>
            <a class="btn btn-secondary" th:href="@{/admin/users}">
                <i class="fas fa-arrow-left mr-1"></i> Back
            </a>
            <a class="btn btn-warning" th:href="@{/admin/users/edit/{id}(id=${user.userId})}">
                <i class="fas fa-edit mr-1"></i> Edit
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body table-responsive">
            <table class="table table-bordered mb-0">
                <tr>
                    <th style="width:220px">ID</th>
                    <td th:text="${user.userId}">1</td>
                </tr>
                <tr>
                    <th>Email</th>
                    <td th:text="${user.email}">user@example.com</td>
                </tr>
                <tr>
                    <th>Full name</th>
                    <td th:text="${user.fullName}">User</td>
                </tr>
                <tr>
                    <th>Identity number</th>
                    <td th:text="${user.identityNumber ?: '-'}">-</td>
                </tr>
                <tr>
                    <th>Date of birth</th>
                    <td th:text="${user.dateOfBirth != null ? #temporals.format(user.dateOfBirth, 'dd/MM/yyyy') : '-'}">-</td>
                </tr>
                <tr>
                    <th>Gender</th>
                    <td th:text="${user.gender ?: '-'}">-</td>
                </tr>
                <tr>
                    <th>Role</th>
                    <td th:text="${user.role}">CUSTOMER</td>
                </tr>
                <tr>
                    <th>Status</th>
                    <td th:text="${user.status}">ACTIVE</td>
                </tr>
                <tr>
                    <th>Created at</th>
                    <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                </tr>
                <tr>
                    <th>Updated at</th>
                    <td th:text="${#temporals.format(user.updatedAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                </tr>
            </table>
        </div>
    </div>
</section>
</html>
