<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin-layout}">
<head>
    <title>User Detail</title>
</head>
<body>
<section layout:fragment="content" class="content-wrapper p-3">

    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="content-header">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div>
                <h1>User Detail</h1>
                <small class="text-muted">Thông tin người dùng</small>
            </div>

            <div>
                <a th:href="@{/admin/users}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <a th:href="@{/admin/users/{id}/edit(id=${user.userId})}" class="btn btn-warning">
                    <i class="fas fa-edit"></i> Edit
                </a>
            </div>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="card card-primary card-outline">
                <div class="card-header">
                    <h3 class="card-title">
                        <i class="fas fa-user"></i>
                        <span th:text="${user.username}">admin</span>
                    </h3>
                </div>

                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-3">User ID</dt>
                        <dd class="col-sm-9" th:text="${user.userId}">1</dd>

                        <dt class="col-sm-3">Username</dt>
                        <dd class="col-sm-9" th:text="${user.username}">admin</dd>

                        <dt class="col-sm-3">Password Hash</dt>
                        <dd class="col-sm-9">
                            <code th:text="${user.passwordHash}">$2a$10...</code>
                        </dd>

                        <dt class="col-sm-3">Role</dt>
                        <dd class="col-sm-9">
                            <span class="badge"
                                  th:classappend="${user.role.name() == 'ADMIN'} ? ' bg-danger' : ' bg-primary'"
                                  th:text="${user.role}">
                                ADMIN
                            </span>
                        </dd>

                        <dt class="col-sm-3">Status</dt>
                        <dd class="col-sm-9">
                            <span class="badge"
                                  th:classappend="${user.status.name() == 'ACTIVE'} ? ' bg-success' :
                                                  (${user.status.name() == 'LOCKED'} ? ' bg-danger' : ' bg-secondary')"
                                  th:text="${user.status}">
                                ACTIVE
                            </span>
                        </dd>

                        <dt class="col-sm-3">Created At</dt>
                        <dd class="col-sm-9"
                            th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}">
                            01/01/2026
                        </dd>

                        <dt class="col-sm-3">Updated At</dt>
                        <dd class="col-sm-9"
                            th:text="${#temporals.format(user.updatedAt, 'dd/MM/yyyy HH:mm')}">
                            01/01/2026
                        </dd>
                    </dl>
                </div>

                <div class="card-footer text-end">
                    <button type="button"
                            class="btn btn-danger"
                            data-bs-toggle="modal"
                            data-bs-target="#deleteUserModal">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>

            <div class="modal fade" id="deleteUserModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Delete User</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="modal-body">
                            Are you sure you want to delete
                            <strong th:text="${user.username}">admin</strong>?
                        </div>

                        <div class="modal-footer">
                            <button type="button"
                                    class="btn btn-secondary"
                                    data-bs-dismiss="modal">
                                Cancel
                            </button>

                            <form th:action="@{/admin/users/{id}/delete(id=${user.userId})}"
                                  method="post">
                                <button type="submit" class="btn btn-danger">
                                    Delete
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </section>
</section>
</body>
</html>
