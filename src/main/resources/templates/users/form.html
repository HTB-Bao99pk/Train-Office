<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout('User form', ~{::section}, 'users')}">
<section>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0" th:text="${user.userId == null ? 'Create user' : 'Edit user'}">User form</h2>
        <a class="btn btn-secondary" th:href="@{/admin/users}">
            <i class="fas fa-arrow-left mr-1"></i> Back
        </a>
    </div>

    <div class="card">
        <form th:action="@{/admin/users/save}" th:object="${user}" method="post">
            <input type="hidden" th:field="*{userId}">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control" th:field="*{email}" type="email" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Password</label>
                        <input class="form-control" th:field="*{password}" type="text" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full name</label>
                        <input class="form-control" th:field="*{fullName}">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Role</label>
                        <select class="form-control" th:field="*{role}" required>
                            <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-control" th:field="*{status}" required>
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="card-footer text-right">
                <button class="btn btn-primary" type="submit">
                    <i class="fas fa-save mr-1"></i> Save
                </button>
            </div>
        </form>
    </div>
</section>
</html>
