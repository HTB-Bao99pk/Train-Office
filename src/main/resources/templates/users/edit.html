<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Edit Users / Người dùng', ~{::section}, 'users')}">
<section>
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div><div class="card"><div class="card-header">Edit / Sửa Users / Người dùng</div><form th:action="@{'/admin/users/save'}" method="post" th:object="${form}"><div class="card-body"><div th:replace="~{fragments/form-errors :: globalErrors}"></div><div class="row g-3"><div class="col-md-6"><label class="form-label">userId</label><input class="form-control" th:field="*{userId}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}">Error</div></div>
<div class="col-md-6"><label class="form-label">email</label><input class="form-control" th:field="*{email}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error</div></div>
<div class="col-md-6"><label class="form-label">password</label><input class="form-control" th:field="*{password}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Error</div></div>
<div class="col-md-6"><label class="form-label">role</label><input class="form-control" th:field="*{role}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('role')}" th:errors="*{role}">Error</div></div>
<div class="col-md-6"><label class="form-label">status</label><input class="form-control" th:field="*{status}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">Error</div></div>
<div class="col-md-6"><label class="form-label">createdAt</label><input class="form-control" th:field="*{createdAt}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('createdAt')}" th:errors="*{createdAt}">Error</div></div>
<div class="col-md-6"><label class="form-label">updatedAt</label><input class="form-control" th:field="*{updatedAt}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('updatedAt')}" th:errors="*{updatedAt}">Error</div></div></div></div><div class="card-footer d-flex justify-content-between"><a class="btn btn-secondary" th:href="@{'/admin/users'}">Back / Quay lại</a><button class="btn btn-primary">Save / Lưu</button></div></form></div>
</section>
</html>
