<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/customer-layout :: layout('Chi tiết vé', ~{::section}, 'tickets')}">
<section class="container customer-page">
    <div class="railjet-card card">
        <div class="card-body p-4 p-lg-5">
            <div class="d-flex flex-wrap justify-content-between gap-3 mb-4">
                <div>
                    <span class="page-eyebrow">Vé tàu</span>
                    <h1 class="fw-bold mt-2 mb-1">RJ-T001</h1>
                    <p class="text-muted mb-0">SE1 - Hà Nội đến Sài Gòn</p>
                </div>
                <span th:replace="~{fragments/status-badge :: statusBadge('CONFIRMED')}"></span>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="summary-box">
                        <div class="text-muted small">Hành khách</div>
                        <strong>Nguyễn Văn A</strong>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="summary-box">
                        <div class="text-muted small">Ghế</div>
                        <strong>A1</strong>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="summary-box">
                        <div class="text-muted small">Trạng thái</div>
                        <strong>CONFIRMED</strong>
                    </div>
                </div>
            </div>

            <a class="btn btn-primary" th:href="@{/tickets/1/print}">
                <i class="bi bi-printer me-2"></i>In vé
            </a>
        </div>
    </div>
</section>
</html>
