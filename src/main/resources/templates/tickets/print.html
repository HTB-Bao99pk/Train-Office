<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Print Ticket | RailJet</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <style>
        :root{--rail-navy:#071a33;--rail-sky:#2fb8f6;--rail-border:#d9e3ef;--rail-muted:#657287}
        body{background:#f3f7fb;color:var(--rail-navy);font-family:"Segoe UI",Arial,sans-serif}
        .ticket-print{max-width:860px;margin:32px auto;padding:0 16px}
        .ticket-card{background:#fff;border:1px solid var(--rail-border);border-top:4px solid var(--rail-sky);border-radius:10px;padding:32px;box-shadow:0 18px 48px rgba(7,26,51,.08)}
        .ticket-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px}
        .ticket-cell{border:1px solid var(--rail-border);border-radius:10px;padding:16px;background:#fff}
        .ticket-cell span{display:block;color:var(--rail-muted);font-size:13px;text-transform:uppercase;font-weight:800}
        .ticket-cell strong{display:block;margin-top:4px;font-size:18px;word-break:break-word}
        .ticket-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
        .ticket-status{display:inline-flex;align-items:center;padding:.35rem .7rem;border-radius:999px;background:#e7f6ff;color:#0b6fa4;font-weight:900;text-transform:uppercase;font-size:.76rem}
        @media print{body{background:#fff}.d-print-none{display:none!important}.ticket-card{box-shadow:none}}
        @media(max-width:640px){.ticket-grid{grid-template-columns:1fr}.ticket-header{flex-direction:column}}
    </style>
</head>
<body>
<main class="ticket-print">
    <div class="d-print-none mb-3 d-flex gap-2">
        <button class="btn btn-primary" onclick="window.print()">Print Ticket</button>
        <a class="btn btn-outline-secondary" th:href="@{/tickets/{id}(id=${ticket.ticketId})}">Back</a>
    </div>
    <div class="ticket-card">
        <div class="ticket-header">
            <div>
                <h1 class="fw-bold mb-1">RailJet Ticket</h1>
                <p class="text-muted mb-0">
                    Ticket code <strong th:text="${ticket.ticketCode}">RJ-T001</strong>
                </p>
            </div>
            <strong class="ticket-status" th:text="${ticket.ticketStatus}">BOOKED</strong>
        </div>
        <div class="ticket-grid">
            <div class="ticket-cell">
                <span>Passenger</span>
                <strong th:text="${ticket.passenger != null ? ticket.passenger.fullName : '-'}">Passenger</strong>
            </div>
            <div class="ticket-cell">
                <span>Route</span>
                <strong>
                    <span th:text="${ticket.booking != null and ticket.booking.departureStation != null ? ticket.booking.departureStation.stationName : '-'}">Ha Noi</span>
                    <span> - </span>
                    <span th:text="${ticket.booking != null and ticket.booking.arrivalStation != null ? ticket.booking.arrivalStation.stationName : '-'}">Sai Gon</span>
                </strong>
            </div>
            <div class="ticket-cell">
                <span>Seat</span>
                <strong th:text="${ticket.seat != null ? ticket.seat.seatNumber : '-'}">A1</strong>
            </div>
            <div class="ticket-cell">
                <span>Coach</span>
                <strong th:text="${ticket.seat != null and ticket.seat.coach != null ? ticket.seat.coach.coachNumber : '-'}">1</strong>
            </div>
            <div class="ticket-cell">
                <span>Train</span>
                <strong th:text="${ticket.trainTrip != null and ticket.trainTrip.train != null ? ticket.trainTrip.train.trainName : '-'}">SE1</strong>
            </div>
            <div class="ticket-cell">
                <span>Departure</span>
                <strong th:text="${ticket.trainTrip != null ? ticket.trainTrip.departureTime : '-'}">2026-06-28T08:00</strong>
            </div>
        </div>
    </div>
</main>
</body>
</html>
