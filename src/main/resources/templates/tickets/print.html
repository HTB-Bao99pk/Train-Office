<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>In vé | RailJet</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <style>
        :root{--rail-navy:#071a33;--rail-sky:#2fb8f6;--rail-border:#d9e3ef}
        body{background:#f3f7fb;color:var(--rail-navy);font-family:"Segoe UI",Arial,sans-serif}
        .ticket-print{max-width:860px;margin:32px auto;padding:0 16px}
        .ticket-card{background:#fff;border:1px solid var(--rail-border);border-top:4px solid var(--rail-sky);border-radius:8px;padding:32px;box-shadow:0 18px 48px rgba(7,26,51,.08)}
        .ticket-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px}
        .ticket-cell{border:1px solid var(--rail-border);border-radius:8px;padding:16px}
        .ticket-cell span{display:block;color:#657287;font-size:13px}
        .ticket-cell strong{display:block;margin-top:4px;font-size:18px}
        @media print{body{background:#fff}.d-print-none{display:none!important}.ticket-card{box-shadow:none}}
        @media(max-width:640px){.ticket-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<main class="ticket-print">
    <button class="btn btn-primary d-print-none mb-3" onclick="window.print()">
        In vé
    </button>
    <div class="ticket-card">
        <div class="d-flex justify-content-between align-items-start gap-3">
            <div>
                <h1 class="fw-bold mb-1">RailJet Ticket</h1>
                <p class="text-muted mb-0">Mã vé <strong>RJ-T001</strong></p>
            </div>
            <strong>CONFIRMED</strong>
        </div>
        <div class="ticket-grid">
            <div class="ticket-cell"><span>Hành khách</span><strong>Nguyễn Văn A</strong></div>
            <div class="ticket-cell"><span>Tuyến</span><strong>Hà Nội - Sài Gòn</strong></div>
            <div class="ticket-cell"><span>Ghế</span><strong>A1</strong></div>
        </div>
    </div>
</main>
</body>
</html>
