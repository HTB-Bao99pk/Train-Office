<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/customer-layout :: layout('Vé của tôi', ~{::section}, 'tickets')}">
<section class="container customer-page">
    <div class="page-hero">
        <span class="page-eyebrow">Vé tàu</span>
        <h1 class="page-title">Danh sách vé</h1>
        <p class="page-subtitle">Xem vé đã tạo, trạng thái và mở chi tiết để in vé khi cần.</p>
    </div>

    <div class="railjet-card card">
        <div class="card-body table-responsive p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Mã vé</th>
                    <th>Hành khách</th>
                    <th>Ghế</th>
                    <th>Giá</th>
                    <th>Trạng thái</th>
                    <th class="text-end">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ticket : ${tickets}">
                    <td class="fw-bold" th:text="${ticket.ticketCode}">RJ-T001</td>
                    <td th:text="${ticket.passenger}">Nguyễn Văn A</td>
                    <td th:text="${ticket.seat}">A1</td>
                    <td th:text="${ticket.price}">450,000 VND</td>
                    <td><span th:replace="~{fragments/status-badge :: statusBadge(${ticket.status})}"></span></td>
                    <td class="text-end"><a class="btn btn-sm btn-primary" th:href="@{/tickets/1}">Chi tiết</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</html>
