<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Edit Schedules / Lịch trình', ~{::section}, 'schedules')}">
<section>
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div><div class="card"><div class="card-header">Edit / Sửa Schedules / Lịch trình</div><form th:action="@{'/admin/schedules/save'}" method="post" th:object="${form}"><div class="card-body"><div th:replace="~{fragments/form-errors :: globalErrors}"></div><div class="row g-3"><div class="col-md-6"><label class="form-label">tripId</label><input class="form-control" th:field="*{tripId}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('tripId')}" th:errors="*{tripId}">Error</div></div>
<div class="col-md-6"><label class="form-label">train</label><input class="form-control" th:field="*{train}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('train')}" th:errors="*{train}">Error</div></div>
<div class="col-md-6"><label class="form-label">route</label><input class="form-control" th:field="*{route}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('route')}" th:errors="*{route}">Error</div></div>
<div class="col-md-6"><label class="form-label">departureTime</label><input class="form-control" th:field="*{departureTime}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('departureTime')}" th:errors="*{departureTime}">Error</div></div>
<div class="col-md-6"><label class="form-label">arrivalTime</label><input class="form-control" th:field="*{arrivalTime}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('arrivalTime')}" th:errors="*{arrivalTime}">Error</div></div>
<div class="col-md-6"><label class="form-label">status</label><input class="form-control" th:field="*{status}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">Error</div></div></div></div><div class="card-footer d-flex justify-content-between"><a class="btn btn-secondary" th:href="@{'/admin/schedules'}">Back / Quay lại</a><button class="btn btn-primary">Save / Lưu</button></div></form></div>
</section>
</html>
