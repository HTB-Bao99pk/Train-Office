<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin-layout}">
<head><title>Schedule Management</title></head>
<body>
<section layout:fragment="content" class="content-wrapper p-3">
    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="content-header">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div>
                <h1>Schedules / Lịch chạy</h1>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="breadcrumb-item active">Schedules</li>
                </ol>
            </div>
            <a th:href="@{/admin/schedules/create}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Schedule
            </a>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="card card-outline card-primary">
                <div class="card-header">
                    <form th:action="@{/admin/schedules}" method="get" class="row g-2">
                        <div class="col-md-4">
                            <input type="text" name="keyword" th:value="${keyword}"
                                   class="form-control"
                                   placeholder="Search train, route...">
                        </div>

                        <div class="col-md-3">
                            <select name="trainId" class="form-select">
                                <option value="">All Trains</option>
                                <option th:each="train : ${trains}"
                                        th:value="${train.trainId}"
                                        th:selected="${trainId == train.trainId}"
                                        th:text="${train.trainCode + ' - ' + train.trainName}">
                                    SE1 - Express
                                </option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <select name="status" class="form-select">
                                <option value="">All Status</option>
                                <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">ACTIVE</option>
                                <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">INACTIVE</option>
                            </select>
                        </div>

                        <div class="col-md-2 d-grid">
                            <button class="btn btn-outline-primary">
                                <i class="fas fa-search"></i> Search
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card-body table-responsive p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Train</th>
                            <th>Route</th>
                            <th>Run Days</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="schedule : ${schedules}">
                            <td th:text="${schedule.scheduleId}">1</td>
                            <td>
                                <span class="badge bg-primary" th:text="${schedule.train.trainCode}">SE1</span>
                                <span th:text="${schedule.train.trainName}">Express</span>
                            </td>
                            <td th:text="${schedule.route.routeName}">Hà Nội - Sài Gòn</td>
                            <td th:text="${schedule.runDays}">MON,TUE,WED</td>
                            <td th:text="${#temporals.format(schedule.startDate, 'dd/MM/yyyy')}">01/01/2026</td>
                            <td th:text="${#temporals.format(schedule.endDate, 'dd/MM/yyyy')}">31/12/2026</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${schedule.status.name() == 'ACTIVE'} ? ' bg-success' : ' bg-secondary'"
                                      th:text="${schedule.status}">
                                    ACTIVE
                                </span>
                            </td>

                            <td class="text-end">
                                <a th:href="@{/admin/schedules/{id}(id=${schedule.scheduleId})}" class="btn btn-sm btn-info">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:href="@{/admin/schedules/{id}/edit(id=${schedule.scheduleId})}" class="btn btn-sm btn-warning">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <button class="btn btn-sm btn-danger"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#deleteScheduleModal' + ${schedule.scheduleId}">
                                    <i class="fas fa-trash"></i>
                                </button>

                                <div class="modal fade" th:id="'deleteScheduleModal' + ${schedule.scheduleId}" tabindex="-1">
                                    <div class="modal-dialog modal-dialog-centered">
                                        <div class="modal-content text-start">
                                            <div class="modal-header">
                                                <h5 class="modal-title">Delete Schedule</h5>
                                                <button class="btn-close" data-bs-dismiss="modal"></button>
                                            </div>
                                            <div class="modal-body">
                                                Delete schedule for
                                                <strong th:text="${schedule.train.trainCode + ' - ' + schedule.route.routeName}">SE1</strong>?
                                            </div>
                                            <div class="modal-footer">
                                                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                <form th:action="@{/admin/schedules/{id}/delete(id=${schedule.scheduleId})}" method="post">
                                                    <button class="btn btn-danger">Delete</button>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(schedules)}">
                            <td colspan="8" class="text-center text-muted py-4">No schedules found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="card-footer">
                    <div th:replace="~{fragments/pagination :: pagination(${page})}"></div>
                </div>
            </div>

        </div>
    </section>
</section>
</body>
</html>
