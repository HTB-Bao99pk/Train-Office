<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin-layout}">
<head>
    <title>Edit Station</title>
</head>
<body>
<section layout:fragment="content" class="content-wrapper p-3">

    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="content-header">
        <div class="container-fluid">
            <h1>Edit Station</h1>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                <li class="breadcrumb-item"><a th:href="@{/admin/stations}">Stations</a></li>
                <li class="breadcrumb-item active">Edit</li>
            </ol>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="card card-warning card-outline">
                <form th:action="@{/admin/stations/{id}/edit(id=${stationForm.stationId})}"
                      method="post"
                      th:object="${stationForm}">

                    <input type="hidden" th:field="*{stationId}">

                    <div class="card-body">
                        <div class="mb-3">
                            <label for="stationCode" class="form-label">Station Code / Mã ga</label>
                            <input type="text"
                                   id="stationCode"
                                   th:field="*{stationCode}"
                                   class="form-control">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('stationCode')}"
                                 th:errors="*{stationCode}">
                                Station code error
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="stationName" class="form-label">Station Name / Tên ga</label>
                            <input type="text"
                                   id="stationName"
                                   th:field="*{stationName}"
                                   class="form-control">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('stationName')}"
                                 th:errors="*{stationName}">
                                Station name error
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="city" class="form-label">City / Thành phố</label>
                            <input type="text"
                                   id="city"
                                   th:field="*{city}"
                                   class="form-control">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('city')}"
                                 th:errors="*{city}">
                                City error
                            </div>
                        </div>
                    </div>

                    <div class="card-footer d-flex justify-content-between">
                        <a th:href="@{/admin/stations}" class="btn btn-secondary">
                            Cancel
                        </a>

                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-save"></i> Update Station
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </section>
</section>
</body>
</html>
