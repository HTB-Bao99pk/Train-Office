<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Edit Stations / Nhà ga', ~{::section}, 'stations')}">
<section>
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div><div class="card"><div class="card-header">Edit / Sửa Stations / Nhà ga</div><form th:action="@{'/admin/stations/save'}" method="post" th:object="${form}"><div class="card-body"><div th:replace="~{fragments/form-errors :: globalErrors}"></div><div class="row g-3"><div class="col-md-6"><label class="form-label">stationId</label><input class="form-control" th:field="*{stationId}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('stationId')}" th:errors="*{stationId}">Error</div></div>
<div class="col-md-6"><label class="form-label">stationCode</label><input class="form-control" th:field="*{stationCode}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('stationCode')}" th:errors="*{stationCode}">Error</div></div>
<div class="col-md-6"><label class="form-label">stationName</label><input class="form-control" th:field="*{stationName}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('stationName')}" th:errors="*{stationName}">Error</div></div>
<div class="col-md-6"><label class="form-label">city</label><input class="form-control" th:field="*{city}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('city')}" th:errors="*{city}">Error</div></div></div></div><div class="card-footer d-flex justify-content-between"><a class="btn btn-secondary" th:href="@{'/admin/stations'}">Back / Quay lại</a><button class="btn btn-primary">Save / Lưu</button></div></form></div>
</section>
</html>
