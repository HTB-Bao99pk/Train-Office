<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Station Management', ~{::section}, 'stations')}">
<section>

    <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">
                <i class="bi bi-building"></i>
                Station Management
            </h2>

            <a th:href="@{/admin/stations/new}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i>
                Add Station
            </a>
        </div>

        <!-- Success -->
        <div class="alert alert-success alert-dismissible fade show"
             th:if="${successMessage}">
            <span th:text="${successMessage}"></span>
            <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Error -->
        <div class="alert alert-danger alert-dismissible fade show"
             th:if="${errorMessage}">
            <span th:text="${errorMessage}"></span>
            <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Search -->

        <div class="card shadow-sm mb-4">

            <div class="card-body">

                <form th:action="@{/admin/stations}" method="get">

                    <div class="row">

                        <div class="col-md-10">

                            <input
                                    class="form-control"
                                    type="text"
                                    name="keyword"
                                    placeholder="Search station..."
                                    th:value="${keyword}">

                        </div>

                        <div class="col-md-2">

                            <button class="btn btn-success w-100">
                                Search
                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>

        <!-- Table -->

        <div class="card shadow">

            <div class="card-body p-0">

                <table class="table table-hover table-bordered align-middle mb-0">

                    <thead class="table-dark">

                    <tr>

                        <th>ID</th>

                        <th>Code</th>

                        <th>Name</th>

                        <th>City</th>

                        <th width="180">Action</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="station : ${stations}">

                        <td th:text="${station.stationId}"></td>

                        <td th:text="${station.stationCode}"></td>

                        <td th:text="${station.stationName}"></td>

                        <td th:text="${station.city}"></td>

                        <td>

                            <a class="btn btn-warning btn-sm"
                               th:href="@{'/admin/stations/edit/' + ${station.stationId}}">
                                Edit
                            </a>

                            <a class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this station?')"
                               th:href="@{'/admin/stations/delete/' + ${station.stationId}}">
                                Delete
                            </a>

                        </td>

                    </tr>

                    <tr th:if="${stations.isEmpty()}">

                        <td colspan="5" class="text-center py-4">

                            No Station Found

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

        <!-- Pagination -->

        <nav class="mt-4">

            <ul class="pagination justify-content-center">

                <li class="page-item"
                    th:classappend="${currentPage==1} ? 'disabled'">

                    <a class="page-link"
                       th:href="@{/admin/stations(page=${currentPage - 1}, keyword=${keyword})}">
                        Previous
                    </a>

                </li>

                <li class="page-item"
                    th:each="i:${#numbers.sequence(1,totalPages)}"
                    th:classappend="${currentPage==i}?'active'">

                    <a class="page-link"
                       th:text="${i}"
                       th:href="@{/admin/stations(page=${i},keyword=${keyword})}">
                    </a>

                </li>

                <li class="page-item"
                    th:classappend="${currentPage==totalPages}?'disabled'">

                    <a class="page-link"
                       th:href="@{/admin/stations(page=${currentPage+1},keyword=${keyword})}">
                        Next
                    </a>

                </li>

            </ul>

        </nav>

    </div>

</section>

</html>
