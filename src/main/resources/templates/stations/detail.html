<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin-layout}">
<head>
    <title>Station Detail</title>
</head>
<body>
<section layout:fragment="content" class="content-wrapper p-3">

    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="content-header">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div>
                <h1>Station Detail</h1>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/admin/stations}">Stations</a></li>
                    <li class="breadcrumb-item active">Detail</li>
                </ol>
            </div>

            <div>
                <a th:href="@{/admin/stations}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <a th:href="@{/admin/stations/{id}/edit(id=${station.stationId})}"
                   class="btn btn-warning">
                    <i class="fas fa-edit"></i> Edit
                </a>
            </div>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="card card-primary card-outline">
                <div class="card-header">
                    <h3 class="card-title">
                        <i class="fas fa-map-marker-alt"></i>
                        <span th:text="${station.stationName}">Sài Gòn Station</span>
                    </h3>
                </div>

                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-3">Station ID</dt>
                        <dd class="col-sm-9" th:text="${station.stationId}">1</dd>

                        <dt class="col-sm-3">Station Code</dt>
                        <dd class="col-sm-9">
                            <span class="badge bg-primary" th:text="${station.stationCode}">SGN</span>
                        </dd>

                        <dt class="col-sm-3">Station Name</dt>
                        <dd class="col-sm-9" th:text="${station.stationName}">Sài Gòn Station</dd>

                        <dt class="col-sm-3">City</dt>
                        <dd class="col-sm-9" th:text="${station.city}">Ho Chi Minh City</dd>
                    </dl>
                </div>

                <div class="card-footer text-end">
                    <button type="button"
                            class="btn btn-danger"
                            data-bs-toggle="modal"
                            data-bs-target="#deleteStationModal">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>

            <div class="modal fade" id="deleteStationModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Delete Station</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="modal-body">
                            Are you sure you want to delete
                            <strong th:text="${station.stationName}">Sài Gòn Station</strong>?
                        </div>

                        <div class="modal-footer">
                            <button type="button"
                                    class="btn btn-secondary"
                                    data-bs-dismiss="modal">
                                Cancel
                            </button>

                            <form th:action="@{/admin/stations/{id}/delete(id=${station.stationId})}"
                                  method="post">
                                <button type="submit" class="btn btn-danger">
                                    Delete
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </section>
</section>
</body>
</html>
