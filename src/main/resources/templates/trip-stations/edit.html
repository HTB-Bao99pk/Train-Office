<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Trip Station</title>
</head>
<body>
<h1>Edit Trip Station</h1>
<p th:if="${error}" th:text="${error}"></p>
<form th:action="@{/admin/trips/{tripId}/stations/{id}/update(tripId=${trip.tripId},id=${tripStation.tripStationId})}" th:object="${tripStation}" method="post">
    <label>Station</label>
    <select th:field="*{station.stationId}" required>
        <option th:each="station : ${stations}" th:value="${station.stationId}" th:text="${station.stationName}"></option>
    </select>

    <label>Station order</label>
    <input type="number" min="1" th:field="*{stationOrder}" required>

    <label>Arrival time</label>
    <input type="datetime-local" th:field="*{arrivalTime}">

    <label>Departure time</label>
    <input type="datetime-local" th:field="*{departureTime}">

    <button type="submit">Update</button>
    <a th:href="@{/admin/trips/{tripId}/stations(tripId=${trip.tripId})}">Back</a>
</form>
</body>
</html>
