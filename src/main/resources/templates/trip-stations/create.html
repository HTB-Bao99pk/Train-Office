<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Create Trip Stations / Ga dừng', ~{::section}, 'trip-stations')}">
<section>
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div><div class="card"><div class="card-header">Create / Tạo Trip Stations / Ga dừng</div><form th:action="@{'/admin/trip-stations/save'}" method="post" th:object="${form}"><div class="card-body"><div th:replace="~{fragments/form-errors :: globalErrors}"></div><div class="row g-3"><div class="col-md-6"><label class="form-label">tripStationId</label><input class="form-control" th:field="*{tripStationId}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('tripStationId')}" th:errors="*{tripStationId}">Error</div></div>
<div class="col-md-6"><label class="form-label">trainTrip</label><input class="form-control" th:field="*{trainTrip}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('trainTrip')}" th:errors="*{trainTrip}">Error</div></div>
<div class="col-md-6"><label class="form-label">station</label><input class="form-control" th:field="*{station}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('station')}" th:errors="*{station}">Error</div></div>
<div class="col-md-6"><label class="form-label">stationOrder</label><input class="form-control" th:field="*{stationOrder}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('stationOrder')}" th:errors="*{stationOrder}">Error</div></div>
<div class="col-md-6"><label class="form-label">arrivalTime</label><input class="form-control" th:field="*{arrivalTime}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('arrivalTime')}" th:errors="*{arrivalTime}">Error</div></div>
<div class="col-md-6"><label class="form-label">departureTime</label><input class="form-control" th:field="*{departureTime}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('departureTime')}" th:errors="*{departureTime}">Error</div></div></div></div><div class="card-footer d-flex justify-content-between"><a class="btn btn-secondary" th:href="@{'/admin/trip-stations'}">Back / Quay lại</a><button class="btn btn-primary">Save / Lưu</button></div></form></div>
</section>
</html>
