<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trip Stations</title>
</head>
<body>
<h1>Trip Stations</h1>
<p>
    <span th:text="${trip.train != null ? trip.train.trainName : 'Trip'}"></span>
    <span th:text="${trip.departureTime}"></span>
</p>
<p><a th:href="@{/admin/trips/{tripId}/stations/create(tripId=${trip.tripId})}">Add station</a></p>
<p th:if="${success}" th:text="${success}"></p>
<p th:if="${error}" th:text="${error}"></p>
<table>
    <thead>
    <tr>
        <th>Order</th>
        <th>Station</th>
        <th>Arrival</th>
        <th>Departure</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="tripStation : ${tripStations}">
        <td th:text="${tripStation.stationOrder}"></td>
        <td th:text="${tripStation.station != null ? tripStation.station.stationName : ''}"></td>
        <td th:text="${tripStation.arrivalTime}"></td>
        <td th:text="${tripStation.departureTime}"></td>
        <td>
            <a th:href="@{/admin/trips/{tripId}/stations/{id}/edit(tripId=${trip.tripId},id=${tripStation.tripStationId})}">Edit</a>
            <form th:action="@{/admin/trips/{tripId}/stations/{id}/delete(tripId=${trip.tripId},id=${tripStation.tripStationId})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
<a th:href="@{/admin/trips/{id}(id=${trip.tripId})}">Back to trip</a>
</body>
</html>
