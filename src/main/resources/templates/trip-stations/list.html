<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin-layout}">
<head><title>Trip Stations</title></head>
<body>
<section layout:fragment="content" class="content-wrapper p-3">
    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="content-header">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div>
                <h1>Trip Stations / Điểm dừng chuyến</h1>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/admin/trips}">Trips</a></li>
                    <li class="breadcrumb-item active">Trip Stations</li>
                </ol>
            </div>
            <a th:href="@{/admin/trip-stations/create}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Stop
            </a>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="card card-outline card-primary">
                <div class="card-header">
                    <form th:action="@{/admin/trip-stations}" method="get" class="row g-2">
                        <div class="col-md-5">
                            <input type="text" name="keyword" th:value="${keyword}"
                                   class="form-control"
                                   placeholder="Search station, trip...">
                        </div>

                        <div class="col-md-5">
                            <select name="tripId" class="form-select">
                                <option value="">All Trips</option>
                                <option th:each="trip : ${trips}"
                                        th:value="${trip.tripId}"
                                        th:selected="${tripId == trip.tripId}"
                                        th:text="${trip.train.trainCode + ' - ' + trip.route.routeName}">
                                    SE1 - Hà Nội - Sài Gòn
                                </option>
                            </select>
                        </div>

                        <div class="col-md-2 d-grid">
                            <button class="btn btn-outline-primary">
                                <i class="fas fa-search"></i> Search
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card-body table-responsive p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Trip</th>
                            <th>Station</th>
                            <th>Order</th>
                            <th>Arrival</th>
                            <th>Departure</th>
                            <th>Stop Minutes</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="ts : ${tripStations}">
                            <td th:text="${ts.tripStationId}">1</td>
                            <td>
                                <span class="badge bg-primary" th:text="${ts.trip.train.trainCode}">SE1</span>
                                <span th:text="${ts.trip.route.routeName}">Hà Nội - Sài Gòn</span>
                            </td>
                            <td th:text="${ts.station.stationName}">Hà Nội</td>
                            <td><span class="badge bg-success" th:text="${ts.stationOrder}">1</span></td>
                            <td th:text="${#temporals.format(ts.arrivalTime, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                            <td th:text="${#temporals.format(ts.departureTime, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                            <td><span th:text="${ts.stopMinutes}">5</span> min</td>

                            <td class="text-end">
                                <a th:href="@{/admin/trip-stations/{id}/edit(id=${ts.tripStationId})}" class="btn btn-sm btn-warning">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <button class="btn btn-sm btn-danger"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#deleteTripStationModal' + ${ts.tripStationId}">
                                    <i class="fas fa-trash"></i>
                                </button>

                                <div class="modal fade" th:id="'deleteTripStationModal' + ${ts.tripStationId}" tabindex="-1">
                                    <div class="modal-dialog modal-dialog-centered">
                                        <div class="modal-content text-start">
                                            <div class="modal-header">
                                                <h5 class="modal-title">Delete Trip Stop</h5>
                                                <button class="btn-close" data-bs-dismiss="modal"></button>
                                            </div>
                                            <div class="modal-body">
                                                Delete stop
                                                <strong th:text="${ts.station.stationName}">Station</strong>?
                                            </div>
                                            <div class="modal-footer">
                                                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                <form th:action="@{/admin/trip-stations/{id}/delete(id=${ts.tripStationId})}" method="post">
                                                    <button class="btn btn-danger">Delete</button>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(tripStations)}">
                            <td colspan="8" class="text-center text-muted py-4">No trip stations found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="card-footer">
                    <div th:replace="~{fragments/pagination :: pagination(${page})}"></div>
                </div>
            </div>

        </div>
    </section>
</section>
</body>
</html>
