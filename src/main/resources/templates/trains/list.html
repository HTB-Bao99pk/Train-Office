<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin-layout}">
<head><title>Train Management</title></head>
<body>
<section layout:fragment="content" class="content-wrapper p-3">
    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="content-header">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div>
                <h1>Trains / Tàu</h1>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="breadcrumb-item active">Trains</li>
                </ol>
            </div>
            <a th:href="@{/admin/trains/create}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Train
            </a>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="row mb-3">
                <div class="col-md-4">
                    <div class="small-box bg-info">
                        <div class="inner">
                            <h3 th:text="${totalTrains ?: 0}">0</h3>
                            <p>Total Trains</p>
                        </div>
                        <div class="icon"><i class="fas fa-train"></i></div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="small-box bg-success">
                        <div class="inner">
                            <h3 th:text="${expressTrains ?: 0}">0</h3>
                            <p>Express Trains</p>
                        </div>
                        <div class="icon"><i class="fas fa-bolt"></i></div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="small-box bg-warning">
                        <div class="inner">
                            <h3 th:text="${localTrains ?: 0}">0</h3>
                            <p>Local Trains</p>
                        </div>
                        <div class="icon"><i class="fas fa-subway"></i></div>
                    </div>
                </div>
            </div>

            <div class="card card-outline card-primary">
                <div class="card-header">
                    <form th:action="@{/admin/trains}" method="get" class="row g-2">
                        <div class="col-md-8">
                            <input type="text" name="keyword" th:value="${keyword}"
                                   class="form-control"
                                   placeholder="Search train code, train name...">
                        </div>

                        <div class="col-md-2">
                            <select name="trainType" class="form-select">
                                <option value="">All Types</option>
                                <option value="EXPRESS" th:selected="${trainType == 'EXPRESS'}">EXPRESS</option>
                                <option value="LOCAL" th:selected="${trainType == 'LOCAL'}">LOCAL</option>
                                <option value="HIGH_SPEED" th:selected="${trainType == 'HIGH_SPEED'}">HIGH_SPEED</option>
                            </select>
                        </div>

                        <div class="col-md-2 d-grid">
                            <button class="btn btn-outline-primary">
                                <i class="fas fa-search"></i> Search
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card-body table-responsive p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Train Code</th>
                            <th>Train Name</th>
                            <th>Train Type</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="train : ${trains}">
                            <td th:text="${train.trainId}">1</td>
                            <td><span class="badge bg-primary" th:text="${train.trainCode}">SE1</span></td>
                            <td class="fw-semibold" th:text="${train.trainName}">SE1 Express</td>
                            <td><span class="badge bg-info" th:text="${train.trainType}">EXPRESS</span></td>

                            <td class="text-end">
                                <a th:href="@{/admin/trains/{id}(id=${train.trainId})}" class="btn btn-sm btn-info">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:href="@{/admin/trains/{id}/edit(id=${train.trainId})}" class="btn btn-sm btn-warning">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <button class="btn btn-sm btn-danger"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#deleteTrainModal' + ${train.trainId}">
                                    <i class="fas fa-trash"></i>
                                </button>

                                <div class="modal fade" th:id="'deleteTrainModal' + ${train.trainId}" tabindex="-1">
                                    <div class="modal-dialog modal-dialog-centered">
                                        <div class="modal-content text-start">
                                            <div class="modal-header">
                                                <h5 class="modal-title">Delete Train</h5>
                                                <button class="btn-close" data-bs-dismiss="modal"></button>
                                            </div>
                                            <div class="modal-body">
                                                Delete train <strong th:text="${train.trainName}">SE1 Express</strong>?
                                            </div>
                                            <div class="modal-footer">
                                                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                <form th:action="@{/admin/trains/{id}/delete(id=${train.trainId})}" method="post">
                                                    <button class="btn btn-danger">Delete</button>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(trains)}">
                            <td colspan="5" class="text-center text-muted py-4">No trains found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="card-footer">
                    <div th:replace="~{fragments/pagination :: pagination(${page})}"></div>
                </div>
            </div>

        </div>
    </section>
</section>
</body>
</html>
