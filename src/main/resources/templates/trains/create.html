<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Create Trains / Tàu', ~{::section}, 'trains')}">
<section>
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div><div class="card"><div class="card-header">Create / Tạo Trains / Tàu</div><form th:action="@{'/admin/trains/save'}" method="post" th:object="${form}"><div class="card-body"><div th:replace="~{fragments/form-errors :: globalErrors}"></div><div class="row g-3"><div class="col-md-6"><label class="form-label">trainId</label><input class="form-control" th:field="*{trainId}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('trainId')}" th:errors="*{trainId}">Error</div></div>
<div class="col-md-6"><label class="form-label">trainCode</label><input class="form-control" th:field="*{trainCode}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('trainCode')}" th:errors="*{trainCode}">Error</div></div>
<div class="col-md-6"><label class="form-label">trainName</label><input class="form-control" th:field="*{trainName}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('trainName')}" th:errors="*{trainName}">Error</div></div>
<div class="col-md-6"><label class="form-label">trainType</label><input class="form-control" th:field="*{trainType}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('trainType')}" th:errors="*{trainType}">Error</div></div></div></div><div class="card-footer d-flex justify-content-between"><a class="btn btn-secondary" th:href="@{'/admin/trains'}">Back / Quay lại</a><button class="btn btn-primary">Save / Lưu</button></div></form></div>
</section>
</html>
