<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/_admin_layout}">

<head>
    <title th:text="${route.id != null ? 'Chỉnh Sửa Tuyến' : 'Thêm Tuyến Mới'}">
        Form Tuyến
    </title>
</head>

<body>
<div layout:fragment="content">

    <h2 th:text="${route.id != null ? 'Chỉnh Sửa Tuyến' : 'Thêm Tuyến Mới'}">
        Form Tuyến
    </h2>

    <div th:if="${errorMessage}"
         th:text="${errorMessage}">
    </div>

    <form th:action="@{/routes/save}"
          th:object="${route}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div>
            <label>Mã Tuyến</label>

            <input type="text"
                   th:field="*{code}"
                   placeholder="Nhập mã đường hành trình"
                   required>
        </div>

        <div>
            <label>Ga Khởi Hành</label>

            <select th:field="*{startStation.id}" required>
                <option value="">-- Chọn Ga Khởi Hành --</option>

                <option th:each="station : ${allStations}"
                        th:value="${station.id}"
                        th:text="|${station.name} (${station.code})|">
                </option>
            </select>
        </div>

        <div>
            <label>Ga Đến</label>

            <select th:field="*{endStation.id}" required>
                <option value="">-- Chọn Ga Đến --</option>

                <option th:each="station : ${allStations}"
                        th:value="${station.id}"
                        th:text="|${station.name} (${station.code})|">
                </option>
            </select>
        </div>

        <div>
            <label>Trạng Thái Hoạt Động</label>

            <select th:field="*{status}" required>
                <option th:each="status : ${statusTypes}"
                        th:value="${status}"
                        th:text="${status}">
                </option>
            </select>
        </div>

        <div>
            <button type="submit">
                Xác Nhận Tuyến
            </button>

            <a th:href="@{/routes}">
                Hủy Thao Tác
            </a>
        </div>

    </form>

</div>
</body>
</html>
