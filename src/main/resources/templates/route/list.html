<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/_admin_layout}">

<head>
    <title>Quản Lý Tuyến</title>
</head>

<body>
<div layout:fragment="content">

    <h2>Quản Lý Tuyến/Đường Hành Trình</h2>

    <div th:if="${successMessage}"
         th:text="${successMessage}">
    </div>

    <div th:if="${errorMessage}"
         th:text="${errorMessage}">
    </div>

    <div>
        <a th:href="@{/routes/new}">
            Thêm Tuyến Mới
        </a>
    </div>

    <br>

    <table border="1">
        <thead>
        <tr>
            <th>ID</th>
            <th>Mã Tuyến</th>
            <th>Ga Khởi Hành</th>
            <th>Ga Đến</th>
            <th>Trạng Thái Hoạt Động</th>
            <th>Hành Động</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="route : ${routes}">

            <td th:text="${route.id}"></td>

            <td th:text="${route.code}"></td>

            <td th:text="${route.startStation.name}"></td>

            <td th:text="${route.endStation.name}"></td>

            <td>
                <span th:if="${route.status.name() == 'ACTIVE'}">
                    Hoạt Động
                </span>

                <span th:if="${route.status.name() == 'INACTIVE'}">
                    Ngưng Hoạt Động
                </span>
            </td>

            <td>
                <a th:href="@{/routes/edit/{id}(id=${route.id})}">
                    Chỉnh Sửa
                </a>

                <a th:href="@{/routes/delete/{id}(id=${route.id})}"
                   onclick="return confirm('Bạn có chắc muốn xóa tuyến này?')">
                    Xóa
                </a>
            </td>

        </tr>

        <tr th:if="${#lists.isEmpty(routes)}">
            <td colspan="6">
                Không có tuyến nào.
            </td>
        </tr>

        </tbody>
    </table>

    <br>

    <a th:href="@{/admin/dashboard}">
        Quay Lại Dashboard
    </a>

</div>
</body>
</html>
