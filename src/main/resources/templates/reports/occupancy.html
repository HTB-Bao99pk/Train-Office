<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Report occupancy / Báo cáo', ~{::section}, 'reports')}">
<section>
<form th:action="@{/admin/reports/occupancy}" method="get" th:object="${filter}" class="card card-body mb-3"><div class="row g-2 align-items-end"><div class="col-md-4"><label>From / Từ ngày</label><input type="date" class="form-control" th:field="*{fromDate}"><div class="text-danger small" th:if="${#fields.hasErrors('fromDate')}" th:errors="*{fromDate}">Error</div></div><div class="col-md-4"><label>To / Đến ngày</label><input type="date" class="form-control" th:field="*{toDate}"><div class="text-danger small" th:if="${#fields.hasErrors('toDate')}" th:errors="*{toDate}">Error</div></div><div class="col-md-4"><button class="btn btn-primary w-100">Filter / Lọc</button></div></div></form><div class="row"><div th:replace="~{fragments/stat-card :: statCard('Total / Tổng', ${totalItems}, 'fas fa-chart-line', ' bg-info', 'Report')}"></div><div th:replace="~{fragments/stat-card :: statCard('Success / Thành công', ${activeItems}, 'fas fa-check', ' bg-success', 'OK')}"></div><div th:replace="~{fragments/stat-card :: statCard('Pending / Chờ', ${pendingItems}, 'fas fa-clock', ' bg-warning', 'Pending')}"></div><div th:replace="~{fragments/stat-card :: statCard('Issue / Vấn đề', ${issueItems}, 'fas fa-exclamation', ' bg-danger', 'Risk')}"></div></div><div class="card"><div class="card-header">occupancy chart / Biểu đồ</div><div class="card-body"><canvas id="occupancyChart" height="120"></canvas></div></div><script th:inline="javascript">new Chart(document.getElementById('occupancyChart'),{type:'bar',data:{labels:/*[[${chartLabels}]]*/[],datasets:[{label:'occupancy',data:/*[[${chartData}]]*/[],backgroundColor:'#2563EB'}]}});</script>
</section>
</html>
