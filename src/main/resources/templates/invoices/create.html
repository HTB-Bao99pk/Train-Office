<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Create Invoices / Hóa đơn', ~{::section}, 'invoices')}">
<section>
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div><div class="card"><div class="card-header">Create / Tạo Invoices / Hóa đơn</div><form th:action="@{'/admin/invoices/save'}" method="post" th:object="${form}"><div class="card-body"><div th:replace="~{fragments/form-errors :: globalErrors}"></div><div class="row g-3"><div class="col-md-6"><label class="form-label">invoiceId</label><input class="form-control" th:field="*{invoiceId}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('invoiceId')}" th:errors="*{invoiceId}">Error</div></div>
<div class="col-md-6"><label class="form-label">invoiceCode</label><input class="form-control" th:field="*{invoiceCode}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('invoiceCode')}" th:errors="*{invoiceCode}">Error</div></div>
<div class="col-md-6"><label class="form-label">payment</label><input class="form-control" th:field="*{payment}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('payment')}" th:errors="*{payment}">Error</div></div>
<div class="col-md-6"><label class="form-label">totalAmount</label><input class="form-control" th:field="*{totalAmount}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('totalAmount')}" th:errors="*{totalAmount}">Error</div></div>
<div class="col-md-6"><label class="form-label">issuedAt</label><input class="form-control" th:field="*{issuedAt}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('issuedAt')}" th:errors="*{issuedAt}">Error</div></div></div></div><div class="card-footer d-flex justify-content-between"><a class="btn btn-secondary" th:href="@{'/admin/invoices'}">Back / Quay lại</a><button class="btn btn-primary">Save / Lưu</button></div></form></div>
</section>
</html>
