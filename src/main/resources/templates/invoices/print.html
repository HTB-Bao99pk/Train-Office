<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Print Invoice | RailJet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white">
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-start border-bottom pb-3 mb-4">
        <div>
            <h1 class="fw-bold">RailJet Invoice / Hóa đơn</h1>
            <p class="mb-0" th:text="${invoice.invoiceCode}">INV0001</p>
        </div>
        <button class="btn btn-primary d-print-none" onclick="window.print()">Print / In</button>
    </div>
    <div class="row mb-4">
        <div class="col-sm-6">
            <p>Booking: <strong th:text="${invoice.booking.bookingCode}">RJ0001</strong></p>
            <p>Date: <span th:text="${#temporals.format(invoice.createdAt, 'dd/MM/yyyy HH:mm')}">24/06/2026</span></p>
        </div>
        <div class="col-sm-6 text-sm-end">
            <p>Status: <strong th:text="${invoice.status}">PAID</strong></p>
            <h3 th:text="${#numbers.formatDecimal(invoice.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</h3>
        </div>
    </div>
    <table class="table table-bordered">
        <thead><tr><th>Item / Hạng mục</th><th>Qty</th><th class="text-end">Amount</th></tr></thead>
        <tbody>
        <tr th:each="ticket : ${invoice.booking.tickets}">
            <td th:text="${ticket.passenger.fullName + ' - ' + ticket.seat.seatNumber}">Ticket A1</td>
            <td>1</td>
            <td class="text-end" th:text="${#numbers.formatDecimal(ticket.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
