<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/_admin_layout}">

<head>
    <title th:text="${carriage.carriageId != null ? 'Chỉnh Sửa Toa Tàu' : 'Thêm Mới Toa Tàu'}">
        Biểu Mẫu Toa Tàu
    </title>
</head>

<body>
<div layout:fragment="content">

    <h2 th:text="${carriage.carriageId != null ? 'Chỉnh Sửa Toa Tàu' : 'Thêm Mới Toa Tàu'}">
        Biểu Mẫu Toa Tàu
    </h2>

    <div th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <form th:action="@{/carriages/save}"
          th:object="${carriage}"
          method="post">

        <input type="hidden" th:field="*{carriageId}">

        <div>
            <label>Thuộc Tàu</label>

            <select th:field="*{train}"
                    required
                    th:disabled="${#lists.size(allTrains) == 1}">

                <option value="">-- Chọn Tàu --</option>

                <option th:each="train : ${allTrains}"
                        th:value="${train.id}"
                        th:text="|${train.code} - ${train.name}|">
                </option>

            </select>

            <input th:if="${#lists.size(allTrains) == 1}"
                   type="hidden"
                   th:field="*{train}">
        </div>

        <br>

        <div>
            <label>Tên Toa</label>

            <input type="text"
                   th:field="*{name}"
                   placeholder="Nhập tên toa"
                   required>
        </div>

        <br>

        <div>
            <label>Loại Ghế</label>

            <select th:field="*{seatType}" required>

                <option value="">-- Chọn Loại Ghế --</option>

                <option th:each="st : ${allSeatTypes}"
                        th:value="${st.id}"
                        th:text="${st.name + ' (' + #numbers.formatDecimal(st.pricePerKm, 0, 'COMMA', 0, 'POINT') + 'đ/km)'}">
                </option>

            </select>
        </div>

        <br>

        <div>
            <label>Mô tả</label>

            <input type="text"
                   th:field="*{type}"
                   placeholder="Nhập mô tả"
                   required>
        </div>

        <br>

        <div>
            <label>Vị trí Toa</label>

            <input type="number"
                   th:field="*{position}"
                   placeholder="Nhập vị trí toa"
                   required>
        </div>

        <br>

        <button type="submit">
            Lưu Toa Tàu
        </button>

        <a th:href="@{/carriages(trainId=${selectedTrainId})}">
            Hủy
        </a>

    </form>

</div>
</body>
</html>
