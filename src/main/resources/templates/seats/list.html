<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin-layout}">
<head><title>Seat Management</title></head>
<body>
<section layout:fragment="content" class="content-wrapper p-3">
    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="content-header">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div>
                <h1>Seats / Ghế</h1>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="breadcrumb-item active">Seats</li>
                </ol>
            </div>
            <div>
                <a th:href="@{/admin/seats/layout}" class="btn btn-success">
                    <i class="fas fa-th"></i> Seat Map
                </a>
                <a th:href="@{/admin/seats/create}" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add Seat
                </a>
            </div>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="row mb-3">
                <div class="col-md-3">
                    <div class="small-box bg-info">
                        <div class="inner"><h3 th:text="${totalSeats ?: 0}">0</h3><p>Total Seats</p></div>
                        <div class="icon"><i class="fas fa-chair"></i></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="small-box bg-success">
                        <div class="inner"><h3 th:text="${availableSeats ?: 0}">0</h3><p>Available</p></div>
                        <div class="icon"><i class="fas fa-check-circle"></i></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="small-box bg-danger">
                        <div class="inner"><h3 th:text="${bookedSeats ?: 0}">0</h3><p>Booked</p></div>
                        <div class="icon"><i class="fas fa-lock"></i></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="small-box bg-secondary">
                        <div class="inner"><h3 th:text="${maintenanceSeats ?: 0}">0</h3><p>Maintenance</p></div>
                        <div class="icon"><i class="fas fa-tools"></i></div>
                    </div>
                </div>
            </div>

            <div class="card card-outline card-primary">
                <div class="card-header">
                    <form th:action="@{/admin/seats}" method="get" class="row g-2">
                        <div class="col-md-4">
                            <input type="text" name="keyword" th:value="${keyword}"
                                   class="form-control"
                                   placeholder="Search seat number...">
                        </div>

                        <div class="col-md-3">
                            <select name="coachId" class="form-select">
                                <option value="">All Coaches</option>
                                <option th:each="coach : ${coaches}"
                                        th:value="${coach.coachId}"
                                        th:selected="${coachId == coach.coachId}"
                                        th:text="${coach.train.trainCode + ' - ' + coach.coachNumber}">
                                    SE1 - C01
                                </option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <select name="seatType" class="form-select">
                                <option value="">All Types</option>
                                <option value="NORMAL" th:selected="${seatType == 'NORMAL'}">NORMAL</option>
                                <option value="VIP" th:selected="${seatType == 'VIP'}">VIP</option>
                                <option value="SLEEPER" th:selected="${seatType == 'SLEEPER'}">SLEEPER</option>
                            </select>
                        </div>

                        <div class="col-md-2 d-grid">
                            <button class="btn btn-outline-primary">
                                <i class="fas fa-search"></i> Search
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card-body table-responsive p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Coach</th>
                            <th>Seat Number</th>
                            <th>Seat Type</th>
                            <th>Extra Price</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="seat : ${seats}">
                            <td th:text="${seat.seatId}">1</td>
                            <td>
                                <span class="badge bg-primary"
                                      th:text="${seat.coach != null ? seat.coach.coachNumber : 'N/A'}">C01</span>
                                <span th:text="${seat.coach != null ? seat.coach.train.trainCode : ''}">SE1</span>
                            </td>
                            <td class="fw-semibold" th:text="${seat.seatNumber}">A01</td>
                            <td><span class="badge bg-info" th:text="${seat.seatType}">NORMAL</span></td>
                            <td th:text="${#numbers.formatDecimal(seat.extraPrice, 0, 'COMMA', 0, 'POINT')} + ' VND'">
                                0 VND
                            </td>

                            <td class="text-end">
                                <a th:href="@{/admin/seats/{id}(id=${seat.seatId})}" class="btn btn-sm btn-info">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:href="@{/admin/seats/{id}/edit(id=${seat.seatId})}" class="btn btn-sm btn-warning">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <button class="btn btn-sm btn-danger"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#deleteSeatModal' + ${seat.seatId}">
                                    <i class="fas fa-trash"></i>
                                </button>

                                <div class="modal fade" th:id="'deleteSeatModal' + ${seat.seatId}" tabindex="-1">
                                    <div class="modal-dialog modal-dialog-centered">
                                        <div class="modal-content text-start">
                                            <div class="modal-header">
                                                <h5 class="modal-title">Delete Seat</h5>
                                                <button class="btn-close" data-bs-dismiss="modal"></button>
                                            </div>
                                            <div class="modal-body">
                                                Delete seat <strong th:text="${seat.seatNumber}">A01</strong>?
                                            </div>
                                            <div class="modal-footer">
                                                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                <form th:action="@{/admin/seats/{id}/delete(id=${seat.seatId})}" method="post">
                                                    <button class="btn btn-danger">Delete</button>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(seats)}">
                            <td colspan="6" class="text-center text-muted py-4">No seats found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="card-footer">
                    <div th:replace="~{fragments/pagination :: pagination(${page})}"></div>
                </div>
            </div>

        </div>
    </section>
</section>
</body>
</html>
