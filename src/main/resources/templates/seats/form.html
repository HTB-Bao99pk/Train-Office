<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Seat Form', ~{::section}, 'seats')}">
<section>

    <div class="container mt-4">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"
                    th:text="${seat.seatId == null ? 'Add New Seat' : 'Edit Seat'}">
                </h4>
            </div>

            <div class="card-body">

                <form th:action="@{/admin/seats/save}"
                      th:object="${seat}"
                      method="post">

                    <input type="hidden" th:field="*{seatId}"/>

                    <select
                            class="form-select"
                            th:field="*{coach.coachId}">

                        <option value="">Select Coach</option>

                        <option
                                th:each="coach : ${allCoaches}"
                                th:value="${coach.coachId}"
                                th:text="${coach.coachNumber}">
                        </option>

                    </select>
                    <input
                            class="form-control"
                            th:field="*{seatNumber}">
                    <input
                            class="form-control"
                            th:field="*{seatType}">
                    <input
                            type="number"
                            step="0.01"
                            class="form-control"
                            th:field="*{extraPrice}">
                    <button
                            type="submit"
                            class="btn btn-success">
                        Save
                    </button>
                    <a
                            th:href="@{/admin/seats(coachId=${selectedCoachId})}"
                            class="btn btn-secondary">
                        Cancel
                    </a>
                </form>

            </div>

        </div>

    </div>

</section>
</html>
