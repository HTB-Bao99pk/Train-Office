<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Edit Seats / Ghế', ~{::section}, 'seats')}">
<section>
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div><div class="card"><div class="card-header">Edit / Sửa Seats / Ghế</div><form th:action="@{'/admin/seats/save'}" method="post" th:object="${form}"><div class="card-body"><div th:replace="~{fragments/form-errors :: globalErrors}"></div><div class="row g-3"><div class="col-md-6"><label class="form-label">seatId</label><input class="form-control" th:field="*{seatId}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('seatId')}" th:errors="*{seatId}">Error</div></div>
<div class="col-md-6"><label class="form-label">coach</label><input class="form-control" th:field="*{coach}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('coach')}" th:errors="*{coach}">Error</div></div>
<div class="col-md-6"><label class="form-label">seatNumber</label><input class="form-control" th:field="*{seatNumber}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('seatNumber')}" th:errors="*{seatNumber}">Error</div></div>
<div class="col-md-6"><label class="form-label">seatType</label><input class="form-control" th:field="*{seatType}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('seatType')}" th:errors="*{seatType}">Error</div></div>
<div class="col-md-6"><label class="form-label">extraPrice</label><input class="form-control" th:field="*{extraPrice}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('extraPrice')}" th:errors="*{extraPrice}">Error</div></div></div></div><div class="card-footer d-flex justify-content-between"><a class="btn btn-secondary" th:href="@{'/admin/seats'}">Back / Quay lại</a><button class="btn btn-primary">Save / Lưu</button></div></form></div>
</section>
</html>
