<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Seat Management', ~{::section}, 'seats')}">
<section>

    <div class="container-fluid mt-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">
                <i class="bi bi-grid-3x3-gap-fill"></i>
                Seat Management
            </h2>

            <a class="btn btn-primary"
               th:href="@{/admin/seats/new(coachId=${selectedCoachId})}">
                <i class="bi bi-plus-circle"></i>
                Add Seat
            </a>
        </div>

        <form th:action="@{/admin/seats}" method="get" class="row mb-3">

            <div class="col-md-4">
                <select class="form-select"
                        name="coachId"
                        onchange="this.form.submit()">

                    <option value="">All Coaches</option>

                    <option
                            th:each="coach : ${allCoaches}"
                            th:value="${coach.coachId}"
                            th:selected="${selectedCoachId != null and selectedCoachId == coach.coachId}"
                            th:text="${coach.coachNumber}">
                    </option>

                </select>
            </div>

        </form>
        <a class="btn btn-primary"
           th:href="@{/admin/seats/new(coachId=${selectedCoachId})}">
            Add Seat
        </a>
        <tr th:each="seat : ${seats}">

            <td th:text="${seat.seatNumber}"></td>

            <td th:text="${seat.coach.coachNumber}"></td>

            <td th:text="${seat.seatType}"></td>

            <td th:text="${seat.extraPrice}"></td>

            <td>

                <a class="btn btn-warning btn-sm"
                   th:href="@{/admin/seats/edit/{id}(id=${seat.seatId})}">
                    Edit
                </a>

                <a class="btn btn-danger btn-sm"
                   th:href="@{/admin/seats/delete/{id}(id=${seat.seatId},coachId=${selectedCoachId})}"
                   onclick="return confirm('Delete this seat?')">
                    Delete
                </a>

            </td>

        </tr>
    </div>

</section>
</html>
