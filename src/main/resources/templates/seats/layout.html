<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout('Seat Layout', ~{::section}, 'seats')}">
<section>
    <div class="admin-page-hero">
        <div>
            <span class="admin-page-kicker"><i class="fas fa-th mr-1"></i> Seat Map</span>
            <h2>Seat Layout</h2>
            <p>Visual overview of seats in the selected coach.</p>
        </div>
        <a class="btn btn-outline-primary" th:href="@{/admin/seats}">
            <i class="fas fa-arrow-left mr-1"></i> Back to seats
        </a>
    </div>

    <div class="card admin-table-card">
        <div class="card-header">
            <span class="admin-card-title">Seat Map</span>
            <small th:text="${#lists.size(seats)} + ' seats'">0 seats</small>
        </div>
        <div class="card-body">
            <div class="seat-map-grid admin-seat-map">
                <button type="button" class="seat available" th:each="seat : ${seats}" th:text="${seat.seatNumber}">A1</button>
            </div>
            <div class="admin-empty-state" th:if="${#lists.isEmpty(seats)}">
                <i class="fas fa-chair"></i>
                <strong>No seats to display</strong>
                <span>Add seats before using the layout view.</span>
            </div>
        </div>
    </div>
</section>
</html>
