<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/_admin_layout}">

<head>

    <title>Station Form</title>

</head>

<div layout:fragment="content">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">

                        <h4 class="mb-0"
                            th:text="${station.stationId==null} ?
                            'Add Station'
                            :
                            'Edit Station'">
                        </h4>

                    </div>

                    <div class="card-body">

                        <div class="alert alert-danger"
                             th:if="${errorMessage}">

                            <span th:text="${errorMessage}"></span>

                        </div>

                        <form th:action="@{/stations/save}"
                              th:object="${station}"
                              method="post">

                            <input type="hidden"
                                   th:field="*{stationId}">

                            <div class="mb-3">

                                <label class="form-label">

                                    Station Code

                                </label>

                                <input
                                        class="form-control"
                                        th:field="*{stationCode}"
                                        required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Station Name

                                </label>

                                <input
                                        class="form-control"
                                        th:field="*{stationName}"
                                        required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    City

                                </label>

                                <input
                                        class="form-control"
                                        th:field="*{city}"
                                        required>

                            </div>

                            <div class="text-end">

                                <a th:href="@{/stations}"
                                   class="btn btn-secondary">

                                    Cancel

                                </a>

                                <button class="btn btn-primary">

                                    Save

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</html>
