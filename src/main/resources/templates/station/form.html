<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/_admin_layout}">

<head>
    <title th:text="*{id} != null ? 'Chỉnh sửa Ga' : 'Thêm Ga mới'">
        Form Ga
    </title>
</head>

<body>
<div layout:fragment="content">

    <h2 th:text="*{id} != null ? 'Chỉnh sửa Ga' : 'Thêm Ga mới'">
        Form Ga
    </h2>

    <div th:if="${errorMessage}"
         th:text="${errorMessage}">
    </div>

    <form th:action="@{/stations/save}"
          th:object="${station}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div>
            <label>Mã Ga</label>
            <input type="text"
                   th:field="*{code}"
                   placeholder="VD: HN, SG, DN"
                   required>
        </div>

        <div>
            <label>Tên Ga</label>
            <input type="text"
                   th:field="*{name}"
                   placeholder="Nhập tên ga"
                   required>
        </div>

        <div>
            <label>Thành phố</label>
            <input type="text"
                   th:field="*{city}"
                   placeholder="Nhập thành phố">
        </div>

        <div>
            <label>Tỉnh</label>
            <input type="text"
                   th:field="*{province}"
                   placeholder="Nhập tỉnh">
        </div>

        <div>
            <label>Khoảng cách (KM)</label>
            <input type="number"
                   th:field="*{distanceKm}"
                   placeholder="Nhập số KM (Ga chuẩn = 0)"
                   required>
        </div>

        <div>
            <label>Trạng thái</label>

            <select th:field="*{status}" required>
                <option th:each="s : ${statusTypes}"
                        th:value="${s}"
                        th:text="${s == 'ACTIVE' ? 'Hoạt động' : 'Ngưng hoạt động'}">
                </option>
            </select>
        </div>

        <div>
            <button type="submit">
                Lưu Ga
            </button>

            <a th:href="@{/stations}">
                Hủy
            </a>
        </div>

    </form>

</div>
</body>
</html>
