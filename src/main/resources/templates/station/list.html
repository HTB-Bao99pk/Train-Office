<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/_admin_layout}">

<head>
    <title>Quản Lý Ga</title>
</head>

<body>
<div layout:fragment="content">

    <h2>Quản Lý Ga</h2>

    <div th:if="${successMessage}"
         th:text="${successMessage}">
    </div>

    <div th:if="${errorMessage}"
         th:text="${errorMessage}">
    </div>

    <div>
        <a th:href="@{/stations/new}">
            Thêm Ga Mới
        </a>
    </div>

    <br>

    <form th:action="@{/stations}" method="get">

        <input type="text"
               name="keyword"
               th:value="${keyword}"
               placeholder="Tìm theo Tên Ga hoặc Mã Ga...">

        <button type="submit">
            Tìm
        </button>

        <a th:href="@{/stations}">
            Xóa
        </a>

    </form>

    <br>

    <table border="1">
        <thead>
        <tr>
            <th>ID</th>
            <th>Mã Ga</th>
            <th>Tên Ga</th>
            <th>Thành phố</th>
            <th>Tỉnh</th>
            <th>KM (Từ ga chuẩn)</th>
            <th>Trạng Thái</th>
            <th>Hành Động</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="station : ${stations}">

            <td th:text="${station.id}"></td>
            <td th:text="${station.code}"></td>
            <td th:text="${station.name}"></td>
            <td th:text="${station.city}"></td>
            <td th:text="${station.province}"></td>

            <td th:text="${station.distanceKm != null ? station.distanceKm + ' km' : 'N/A'}">
            </td>

            <td>
                <span th:if="${station.status.name() == 'ACTIVE'}">
                    Hoạt động
                </span>

                <span th:if="${station.status.name() == 'INACTIVE'}">
                    Ngưng hoạt động
                </span>
            </td>

            <td>
                <a th:href="@{/stations/edit/{id}(id=${station.id})}">
                    Chỉnh sửa
                </a>

                <a th:href="@{/stations/delete/{id}(id=${station.id})}"
                   onclick="return confirm('Bạn có chắc chắn muốn xóa?')">
                    Xóa
                </a>
            </td>

        </tr>

        <tr th:if="${#lists.isEmpty(stations)}">
            <td colspan="8">
                Không tìm thấy ga nào.
            </td>
        </tr>

        </tbody>
    </table>

    <br>

    <div th:if="${totalPages > 1}">

        <a th:href="@{/stations(page=1, keyword=${keyword})}">
            Đầu
        </a>

        <a th:href="@{/stations(page=${currentPage - 1}, keyword=${keyword})}">
            Trước
        </a>

        <span th:each="i : ${#numbers.sequence(1, totalPages)}">

            <a th:href="@{/stations(page=${i}, keyword=${keyword})}"
               th:text="${i}">
            </a>

        </span>

        <a th:href="@{/stations(page=${currentPage + 1}, keyword=${keyword})}">
            Sau
        </a>

        <a th:href="@{/stations(page=${totalPages}, keyword=${keyword})}">
            Cuối
        </a>

    </div>

    <br>

    <a th:href="@{/admin/dashboard}">
        Quay Lại Dashboard
    </a>

</div>
</body>
</html>
