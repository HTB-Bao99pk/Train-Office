<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/customer-layout :: layout('Booking History / Lịch sử đặt vé', ~{::section}, 'booking')}">
<section class="container">
    <div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div>
    <div class="railjet-card card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>Booking history / Lịch sử đặt vé</span>
            <a th:href="@{/booking/search}" class="btn btn-sm btn-primary">New booking / Đặt vé mới</a>
        </div>
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead><tr><th>Code</th><th>Trip</th><th>Date</th><th>Total</th><th>Status</th><th></th></tr></thead>
                <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="${booking.bookingCode}">RJ0001</td>
                    <td th:text="${booking.trip.route.routeName}">Ha Noi - Sai Gon</td>
                    <td th:text="${#temporals.format(booking.createdAt, 'dd/MM/yyyy')}">24/06/2026</td>
                    <td th:text="${#numbers.formatDecimal(booking.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</td>
                    <td><span th:replace="~{fragments/status-badge :: statusBadge(${booking.status})}"></span></td>
                    <td class="text-end"><a class="btn btn-sm btn-outline-primary" th:href="@{/booking/{id}(id=${booking.bookingId})}">Detail / Chi tiết</a></td>
                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}"><td colspan="6" class="text-center text-muted py-4">No bookings / Chưa có đặt vé</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</html>
