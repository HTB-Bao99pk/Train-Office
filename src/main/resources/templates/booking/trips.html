<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/customer-layout :: layout('Trips / Chuyến tàu', ~{::section}, 'booking')}">
<section class="container">
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div><div class="d-flex justify-content-between align-items-center mb-3"><h1 class="fw-bold">Select trip / Chọn chuyến</h1><a class="btn btn-outline-primary" th:href="@{/booking/search}">Modify search</a></div><div class="row g-3"><div class="col-12" th:each="trip : ${trips}"><div class="railjet-card card"><div class="card-body row align-items-center g-3"><div class="col-md-3"><span class="badge text-bg-primary" th:text="${trip.train}">SE1</span><h5 th:text="${trip.route}">Route</h5></div><div class="col-md-3"><strong th:text="${trip.departureTime}">08:00</strong><div class="text-muted">Departure / Khởi hành</div></div><div class="col-md-3"><strong th:text="${trip.arrivalTime}">20:00</strong><div class="text-muted">Arrival / Đến nơi</div></div><div class="col-md-3 text-md-end"><div class="h5 text-primary" th:text="${trip.basePrice}">450000</div><a class="btn btn-primary" th:href="@{/booking/1/seats}">Select seats / Chọn ghế</a></div></div></div></div></div>
</section>
</html>
