<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/customer-layout :: layout('Select Seats', ~{::section}, 'booking')}">
<section class="booking-shell booking-section">
    <div class="booking-progress">
        <div class="booking-progress-item done"><span>1</span>Search</div>
        <div class="booking-progress-item done"><span>2</span>Select trip</div>
        <div class="booking-progress-item active"><span>3</span>Select seats</div>
        <div class="booking-progress-item"><span>4</span>Passengers</div>
        <div class="booking-progress-item"><span>5</span>Confirm</div>
        <div class="booking-progress-item"><span>6</span>Done</div>
    </div>

    <div class="page-hero compact-hero">
        <span class="page-eyebrow">Seat map</span>
        <h1 class="page-title">Choose your seats</h1>
        <p class="page-subtitle">
            <strong th:text="${trip.train != null ? trip.train.trainName : 'Train trip'}">SE1</strong>
            <span> · </span>
            <span th:text="${segment.departureStop.station.stationName}">Ha Noi</span>
            <span> to </span>
            <span th:text="${segment.arrivalStop.station.stationName}">Da Nang</span>
        </p>
    </div>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/booking/seat-selection}" th:object="${seatSelectionForm}" method="post">
        <input type="hidden" th:field="*{trainTripId}">
        <input type="hidden" th:field="*{departureStationId}">
        <input type="hidden" th:field="*{arrivalStationId}">
        <input type="hidden" th:field="*{passengerCount}">

        <div class="seat-selection-grid">
            <div class="railjet-card card">
                <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <span>Select exactly <strong th:text="*{passengerCount}">1</strong> seats</span>
                    <div class="seat-legend mb-0">
                        <span><i class="seat-dot available"></i>Available</span>
                        <span><i class="seat-dot selected"></i>Selected</span>
                        <span><i class="seat-dot booked"></i>Booked</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="coach-shell">
                        <div class="coach-head">Coach layout</div>
                        <div class="seat-map-grid">
                            <label class="seat-choice" th:each="item : ${seats}">
                                <input type="checkbox" th:field="*{seatIds}" th:value="${item.seat.seatId}" th:disabled="${!item.available}">
                                <span class="seat-choice-box">
                                    <span>
                                        <span th:text="${item.seat.coach.coachNumber}">A</span>
                                        <span th:text="${item.seat.seatNumber}">01</span>
                                    </span>
                                    <small th:text="${item.seat.seatType}">Standard</small>
                                </span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <aside class="railjet-card card sticky-summary">
                <div class="card-header">Selection summary</div>
                <div class="card-body">
                    <div class="summary-box mb-3">
                        <span class="summary-label">Route</span>
                        <strong>
                            <span th:text="${segment.departureStop.station.stationName}">Ha Noi</span>
                            <span> → </span>
                            <span th:text="${segment.arrivalStop.station.stationName}">Da Nang</span>
                        </strong>
                        <small th:text="${trip.departureTime}">Departure date</small>
                    </div>
                    <div class="summary-line">
                        <span>Passengers</span>
                        <strong th:text="*{passengerCount}">1</strong>
                    </div>
                    <div class="summary-line">
                        <span>Base price</span>
                        <strong th:text="${trip.basePrice}">0</strong>
                    </div>
                    <div class="booking-actions mt-4">
                        <button class="btn btn-primary w-100" type="submit">Continue</button>
                        <a class="btn btn-outline-primary w-100" th:href="@{/booking/search}">Back to search</a>
                    </div>
                </div>
            </aside>
        </div>
    </form>
</section>
</html>
