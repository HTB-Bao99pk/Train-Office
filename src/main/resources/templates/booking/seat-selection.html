<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/customer-layout :: layout('Seat Selection / Chọn ghế', ~{::section}, 'booking')}">
<section class="container">
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div><form th:action="@{/booking/passenger-info}" method="post" th:object="${form}"><div class="row g-4"><div class="col-lg-8"><div class="railjet-card card"><div class="card-header">Seat map / Sơ đồ ghế</div><div class="card-body"><div class="d-flex gap-3 small mb-3"><span><span class="badge bg-success"> </span> Available</span><span><span class="badge bg-primary"> </span> Selected</span><span><span class="badge bg-secondary"> </span> Booked</span></div><div class="seat-map-grid"><label class="seat available" th:each="seat : ${seats}"><input type="checkbox" class="d-none" th:field="*{seatIds}" th:value="${seat.seatId}"><span th:text="${seat.seatNumber}">A1</span></label></div><div class="text-danger small" th:if="${#fields.hasErrors('seatIds')}" th:errors="*{seatIds}">Error</div></div></div></div><div class="col-lg-4"><div class="railjet-card card"><div class="card-header">Summary / Tóm tắt</div><div class="card-body"><p>SE1 - Ha Noi to Sai Gon</p><button class="btn btn-primary w-100">Continue / Tiếp tục</button></div></div></div></div></form>
</section>
</html>
