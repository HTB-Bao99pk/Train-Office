<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/customer-layout :: layout('Passenger Info / Hành khách', ~{::section}, 'booking')}">
<section class="container">
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div><form th:action="@{/booking/confirmation}" method="post" th:object="${form}"><div class="railjet-card card"><div class="card-header">Guest checkout / Thông tin khách</div><div class="card-body row g-3"><div class="col-md-4"><label>Contact name</label><input class="form-control" th:field="*{contactName}"><div class="text-danger small" th:if="${#fields.hasErrors('contactName')}" th:errors="*{contactName}">Error</div></div><div class="col-md-4"><label>Phone</label><input class="form-control" th:field="*{contactPhone}"><div class="text-danger small" th:if="${#fields.hasErrors('contactPhone')}" th:errors="*{contactPhone}">Error</div></div><div class="col-md-4"><label>Email</label><input class="form-control" th:field="*{contactEmail}"><div class="text-danger small" th:if="${#fields.hasErrors('contactEmail')}" th:errors="*{contactEmail}">Error</div></div><div class="col-md-6"><label>Passenger name / Họ tên</label><input class="form-control" th:field="*{fullName}"><div class="text-danger small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}">Error</div></div><div class="col-md-6"><label>Identity number / CCCD</label><input class="form-control" th:field="*{identityNumber}"><div class="text-danger small" th:if="${#fields.hasErrors('identityNumber')}" th:errors="*{identityNumber}">Error</div></div><div class="col-12 text-end"><button class="btn btn-primary">Review booking / Xem lại</button></div></div></div></form>
</section>
</html>
