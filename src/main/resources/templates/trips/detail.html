<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Train Trip Detail</title>
</head>
<body>
<h1>Train Trip Detail</h1>
<dl th:object="${trip}">
    <dt>ID</dt><dd th:text="*{tripId}"></dd>
    <dt>Train</dt><dd th:text="*{train != null ? train.trainName : ''}"></dd>
    <dt>Route</dt><dd th:text="*{route != null ? route.routeName : ''}"></dd>
    <dt>Departure</dt><dd th:text="*{departureTime}"></dd>
    <dt>Arrival</dt><dd th:text="*{arrivalTime}"></dd>
    <dt>Base price</dt><dd th:text="*{basePrice}"></dd>
    <dt>Status</dt><dd th:text="*{status}"></dd>
</dl>
<a th:href="@{/admin/trips/{id}/edit(id=${trip.tripId})}">Edit</a>
<a th:href="@{/admin/trips/{id}/stations(id=${trip.tripId})}">Stations</a>
<a th:href="@{/admin/trips}">Back</a>
</body>
</html>
