<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Train Trip</title>
</head>
<body>
<h1>Create Train Trip</h1>
<p th:if="${error}" th:text="${error}"></p>
<form th:action="@{/admin/trips/save}" th:object="${trip}" method="post">
    <label>Train</label>
    <select name="train.trainId" required>
        <option value="">Select train</option>
        <option th:each="train : ${trains}" th:value="${train.trainId}" th:text="${train.trainName}"></option>
    </select>

    <label>Route</label>
    <select name="route.routeId" required>
        <option value="">Select route</option>
        <option th:each="route : ${routes}" th:value="${route.routeId}" th:text="${route.routeName}"></option>
    </select>

    <label>Departure time</label>
    <input type="datetime-local" th:field="*{departureTime}" required>

    <label>Arrival time</label>
    <input type="datetime-local" th:field="*{arrivalTime}" required>

    <label>Base price</label>
    <input type="number" step="1000" min="0" th:field="*{basePrice}" required>

    <label>Status</label>
    <select th:field="*{status}" required>
        <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
    </select>

    <button type="submit">Save</button>
    <a th:href="@{/admin/trips}">Back</a>
</form>
</body>
</html>
