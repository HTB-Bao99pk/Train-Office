<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin-layout}">
<head><title>Trip Management</title></head>
<body>
<section layout:fragment="content" class="content-wrapper p-3">
    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="content-header">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div>
                <h1>Trips / Chuyến tàu</h1>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="breadcrumb-item active">Trips</li>
                </ol>
            </div>
            <a th:href="@{/admin/trips/create}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Trip
            </a>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="row mb-3">
                <div class="col-md-3">
                    <div class="small-box bg-info">
                        <div class="inner"><h3 th:text="${totalTrips ?: 0}">0</h3><p>Total Trips</p></div>
                        <div class="icon"><i class="fas fa-calendar-alt"></i></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="small-box bg-success">
                        <div class="inner"><h3 th:text="${scheduledTrips ?: 0}">0</h3><p>Scheduled</p></div>
                        <div class="icon"><i class="fas fa-clock"></i></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="small-box bg-warning">
                        <div class="inner"><h3 th:text="${runningTrips ?: 0}">0</h3><p>Running</p></div>
                        <div class="icon"><i class="fas fa-train"></i></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="small-box bg-danger">
                        <div class="inner"><h3 th:text="${cancelledTrips ?: 0}">0</h3><p>Cancelled</p></div>
                        <div class="icon"><i class="fas fa-ban"></i></div>
                    </div>
                </div>
            </div>

            <div class="card card-outline card-primary">
                <div class="card-header">
                    <form th:action="@{/admin/trips}" method="get" class="row g-2">
                        <div class="col-md-3">
                            <input type="text" name="keyword" th:value="${keyword}"
                                   class="form-control" placeholder="Search train, route...">
                        </div>

                        <div class="col-md-3">
                            <select name="trainId" class="form-select">
                                <option value="">All Trains</option>
                                <option th:each="train : ${trains}"
                                        th:value="${train.trainId}"
                                        th:selected="${trainId == train.trainId}"
                                        th:text="${train.trainCode + ' - ' + train.trainName}">
                                    SE1 - Express
                                </option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <select name="status" class="form-select">
                                <option value="">All Status</option>
                                <option value="SCHEDULED" th:selected="${status == 'SCHEDULED'}">SCHEDULED</option>
                                <option value="RUNNING" th:selected="${status == 'RUNNING'}">RUNNING</option>
                                <option value="COMPLETED" th:selected="${status == 'COMPLETED'}">COMPLETED</option>
                                <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">CANCELLED</option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <input type="date" name="date" th:value="${date}" class="form-control">
                        </div>

                        <div class="col-md-2 d-grid">
                            <button class="btn btn-outline-primary">
                                <i class="fas fa-search"></i> Search
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card-body table-responsive p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Train</th>
                            <th>Route</th>
                            <th>Departure</th>
                            <th>Arrival</th>
                            <th>Status</th>
                            <th>Base Price</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="trip : ${trips}">
                            <td th:text="${trip.tripId}">1</td>
                            <td>
                                <span class="badge bg-primary" th:text="${trip.train.trainCode}">SE1</span>
                                <span th:text="${trip.train.trainName}">Express</span>
                            </td>
                            <td th:text="${trip.route.routeName}">Hà Nội - Sài Gòn</td>
                            <td th:text="${#temporals.format(trip.departureTime, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                            <td th:text="${#temporals.format(trip.arrivalTime, 'dd/MM/yyyy HH:mm')}">02/01/2026</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${trip.status.name() == 'SCHEDULED'} ? ' bg-success' :
                                                      (${trip.status.name() == 'RUNNING'} ? ' bg-warning' :
                                                      (${trip.status.name() == 'CANCELLED'} ? ' bg-danger' : ' bg-secondary'))"
                                      th:text="${trip.status}">
                                    SCHEDULED
                                </span>
                            </td>
                            <td th:text="${#numbers.formatDecimal(trip.basePrice, 0, 'COMMA', 0, 'POINT')} + ' VND'">
                                250,000 VND
                            </td>

                            <td class="text-end">
                                <a th:href="@{/admin/trips/{id}(id=${trip.tripId})}" class="btn btn-sm btn-info">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:href="@{/admin/trips/{id}/stations(id=${trip.tripId})}" class="btn btn-sm btn-success">
                                    <i class="fas fa-map-marker-alt"></i>
                                </a>
                                <a th:href="@{/admin/trips/{id}/edit(id=${trip.tripId})}" class="btn btn-sm btn-warning">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <button class="btn btn-sm btn-danger"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#deleteTripModal' + ${trip.tripId}">
                                    <i class="fas fa-trash"></i>
                                </button>

                                <div class="modal fade" th:id="'deleteTripModal' + ${trip.tripId}" tabindex="-1">
                                    <div class="modal-dialog modal-dialog-centered">
                                        <div class="modal-content text-start">
                                            <div class="modal-header">
                                                <h5 class="modal-title">Delete Trip</h5>
                                                <button class="btn-close" data-bs-dismiss="modal"></button>
                                            </div>
                                            <div class="modal-body">
                                                Delete trip
                                                <strong th:text="${trip.train.trainCode + ' - ' + trip.route.routeName}">SE1</strong>?
                                            </div>
                                            <div class="modal-footer">
                                                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                <form th:action="@{/admin/trips/{id}/delete(id=${trip.tripId})}" method="post">
                                                    <button class="btn btn-danger">Delete</button>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(trips)}">
                            <td colspan="8" class="text-center text-muted py-4">No trips found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="card-footer">
                    <div th:replace="~{fragments/pagination :: pagination(${page})}"></div>
                </div>
            </div>

        </div>
    </section>
</section>
</body>
</html>
