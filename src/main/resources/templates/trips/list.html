<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Train Trips</title>
</head>
<body>
<h1>Train Trips</h1>
<p><a th:href="@{/admin/trips/create}">Create trip</a></p>
<p th:if="${success}" th:text="${success}"></p>
<p th:if="${error}" th:text="${error}"></p>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Train</th>
        <th>Route</th>
        <th>Departure</th>
        <th>Arrival</th>
        <th>Base price</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="trip : ${trips}">
        <td th:text="${trip.tripId}"></td>
        <td th:text="${trip.train != null ? trip.train.trainName : ''}"></td>
        <td th:text="${trip.route != null ? trip.route.routeName : ''}"></td>
        <td th:text="${trip.departureTime}"></td>
        <td th:text="${trip.arrivalTime}"></td>
        <td th:text="${trip.basePrice}"></td>
        <td th:text="${trip.status}"></td>
        <td>
            <a th:href="@{/admin/trips/{id}(id=${trip.tripId})}">Detail</a>
            <a th:href="@{/admin/trips/{id}/edit(id=${trip.tripId})}">Edit</a>
            <a th:href="@{/admin/trips/{id}/stations(id=${trip.tripId})}">Stations</a>
            <form th:action="@{/admin/trips/{id}/cancel(id=${trip.tripId})}" method="post" style="display:inline">
                <button type="submit">Cancel</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
