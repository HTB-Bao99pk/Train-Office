<!-- templates/fragments/modal.html -->
<div class="modal fade" id="confirmModal" tabindex="-1" xmlns:th="http://www.thymeleaf.org" th:fragment="modal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content railjet-modal">
            <div class="modal-header">
                <h5 class="modal-title" th:text="${modalTitle ?: 'Confirm action'}">Confirm action</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" th:text="${modalMessage ?: 'Are you sure you want to continue?'}">
                Are you sure you want to continue?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="confirmActionBtn">Confirm</button>
            </div>
        </div>
    </div>
</div>
