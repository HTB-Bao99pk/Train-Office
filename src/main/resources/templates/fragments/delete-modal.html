<!-- templates/fragments/delete-modal.html -->
<div xmlns:th="http://www.thymeleaf.org"
     th:fragment="deleteModal(modalId, title, message, actionUrl)"
     class="modal fade" th:id="${modalId}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content railjet-modal">
            <div class="modal-header">
                <h5 class="modal-title" th:text="${title ?: 'Delete / Xóa'}">Delete / Xóa</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" th:text="${message ?: 'Are you sure? / Bạn chắc chắn?'}">
                Are you sure?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel / Hủy</button>
                <form th:action="@{${actionUrl}}" method="post">
                    <button type="submit" class="btn btn-danger">Delete / Xóa</button>
                </form>
            </div>
        </div>
    </div>
</div>
