<div class="customer-sidebar" xmlns:th="http://www.thymeleaf.org" th:fragment="customerSidebar(activeMenu)">
    <a th:href="@{/booking/search}" th:classappend="${activeMenu == 'booking'} ? 'active'">
        <i class="bi bi-search"></i> Tìm chuyến
    </a>
    <a th:href="@{/booking/history}" th:classappend="${activeMenu == 'history'} ? 'active'">
        <i class="bi bi-calendar-check"></i> Đặt chỗ của tôi
    </a>
    <a th:href="@{/profile}" th:classappend="${activeMenu == 'profile'} ? 'active'" th:if="${session.currentUser != null}">
        <i class="bi bi-person-circle"></i> Hồ sơ
    </a>
    <a th:href="@{/logout}" th:if="${session.currentUser != null}">
        <i class="bi bi-box-arrow-right"></i> Đăng xuất
    </a>



</div>
