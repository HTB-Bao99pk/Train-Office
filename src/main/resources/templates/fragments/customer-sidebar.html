<!-- templates/fragments/customer-sidebar.html -->
<div class="customer-sidebar" xmlns:th="http://www.thymeleaf.org" th:fragment="customerSidebar(activeMenu)">
    <a th:href="@{/}" th:classappend="${activeMenu == 'home'} ? 'active'">
        <i class="bi bi-house-door"></i> Home
    </a>
    <a th:href="@{/trips/search}" th:classappend="${activeMenu == 'search'} ? 'active'">
        <i class="bi bi-search"></i> Search Trip
    </a>
    <a th:href="@{/bookings}" th:classappend="${activeMenu == 'bookings'} ? 'active'">
        <i class="bi bi-calendar-check"></i> My Bookings
    </a>
    <a th:href="@{/tickets}" th:classappend="${activeMenu == 'tickets'} ? 'active'">
        <i class="bi bi-ticket-perforated"></i> Tickets
    </a>
    <a th:href="@{/profile}" th:classappend="${activeMenu == 'profile'} ? 'active'">
        <i class="bi bi-person-circle"></i> Profile
    </a>
</div>
