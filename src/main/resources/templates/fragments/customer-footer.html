<footer class="customer-footer" xmlns:th="http://www.thymeleaf.org" th:fragment="customerFooter">
    <div class="container">
        <div class="customer-footer-inner">
            <div>
                <h5>RailJet Velocity</h5>
                <p>Book faster and manage your journeys with clarity.</p>
            </div>

            <div class="footer-links">
                <a th:href="@{/booking/search}">Search Trip</a>
                <a th:href="@{/booking/history}">My Bookings</a>
                <a th:href="@{/profile}" th:if="${session.currentUser != null}">Profile</a>
                <a th:href="@{/logout}" th:if="${session.currentUser != null}">Logout</a>
            </div>

            <span class="footer-copy">© 2026 RailJet.</span>
        </div>
    </div>
</footer>
