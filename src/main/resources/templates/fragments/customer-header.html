<nav class="navbar navbar-expand-lg customer-navbar rail-midnight-header"
     xmlns:th="http://www.thymeleaf.org"
     th:fragment="customerHeader(activeMenu)">

    <div class="container rail-header-container">
        <a class="navbar-brand rail-header-brand" th:href="@{/booking/search}">
            <i class="bi bi-train-front-fill me-2"></i>
            RailJet
        </a>

        <button class="navbar-toggler rail-header-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#customerNav"
                aria-controls="customerNav"
                aria-expanded="false"
                aria-label="Open menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="customerNav" class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto align-items-lg-center rail-header-menu">

                <li class="nav-item">
                    <a class="nav-link rail-header-link"
                       th:classappend="${activeMenu == 'booking'} ? ' active'"
                       th:href="@{/booking/search}">
                        <i class="bi bi-search me-1"></i>
                        Search trip
                    </a>
                </li>

                <li class="nav-item" th:if="${session.currentUser != null}">
                    <a class="nav-link rail-header-link"
                       th:classappend="${activeMenu == 'history'} ? ' active'"
                       th:href="@{/booking/history}">
                        <i class="bi bi-calendar-check me-1"></i>
                        My bookings
                    </a>
                </li>

                <li class="nav-item" th:if="${session.currentUser != null}">
                    <a class="nav-link rail-header-link"
                       th:classappend="${activeMenu == 'tickets'} ? ' active'"
                       th:href="@{/tickets}">
                        <i class="bi bi-ticket-perforated me-1"></i>
                        My tickets
                    </a>
                </li>

                <li class="nav-item" th:if="${session.currentUser != null}">
                    <a class="nav-link rail-header-link"
                       th:classappend="${activeMenu == 'profile'} ? ' active'"
                       th:href="@{/profile}">
                        <i class="bi bi-person-circle me-1"></i>
                        Profile
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link rail-header-link"
                       th:classappend="${activeMenu == 'allTrips'} ? ' active'"
                       th:href="@{/booking/all-trips}">
                        <i class="bi bi-list-ul me-1"></i>
                        All trips
                    </a>
                </li>

                <li class="nav-item ms-lg-3" th:if="${session.currentUser == null}">
                    <a class="btn rail-register-btn btn-sm" th:href="@{/register}">
                        Register
                    </a>
                </li>

                <li class="nav-item" th:if="${session.currentUser == null}">
                    <a class="btn rail-login-btn btn-sm" th:href="@{/login}">
                        Login
                    </a>
                </li>

                <li class="nav-item ms-lg-3"
                    th:if="${session.currentUser != null and session.currentUser.role.name() == 'ADMIN'}">
                    <a class="btn rail-admin-btn btn-sm" th:href="@{/admin}">
                        <i class="bi bi-speedometer2 me-1"></i>
                        Admin
                    </a>
                </li>

                <li class="nav-item dropdown ms-lg-3" th:if="${session.currentUser != null}">
                    <a class="nav-link dropdown-toggle rail-user-trigger"
                       href="#"
                       role="button"
                       data-bs-toggle="dropdown"
                       aria-expanded="false">

                        <span class="rail-user-avatar">
                            <i class="bi bi-person-fill"></i>
                        </span>

                        <span class="rail-user-name"
                              th:text="${session.currentUser.fullName != null and !#strings.isEmpty(session.currentUser.fullName) ? session.currentUser.fullName : session.currentUser.email}">
                            user@example.com
                        </span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end rail-user-dropdown">
                        <li class="dropdown-header rail-dropdown-header">
                            <div class="small text-muted">Signed in as</div>

                            <div class="fw-semibold rail-dropdown-email"
                                 th:text="${session.currentUser.email}">
                                user@example.com
                            </div>

                            <div class="small text-muted"
                                 th:text="${session.currentUser.role}">
                                CUSTOMER
                            </div>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <a class="dropdown-item" th:href="@{/booking/search}">
                                <i class="bi bi-search me-2"></i>
                                Search trip
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" th:href="@{/booking/history}">
                                <i class="bi bi-calendar-check me-2"></i>
                                My bookings
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" th:href="@{/tickets}">
                                <i class="bi bi-ticket-perforated me-2"></i>
                                My tickets
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" th:href="@{/profile}">
                                <i class="bi bi-person-circle me-2"></i>
                                Profile
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" th:href="@{/change-password}">
                                <i class="bi bi-shield-lock me-2"></i>
                                Change Password
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <a class="dropdown-item text-danger" th:href="@{/logout}">
                                <i class="bi bi-box-arrow-right me-2"></i>
                                Logout
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
