<!-- templates/fragments/admin-sidebar.html -->
<aside class="main-sidebar sidebar-dark-primary elevation-4" xmlns:th="http://www.thymeleaf.org"
       th:fragment="adminSidebar(activeMenu)">
    <a th:href="@{/admin}" class="brand-link">
        <i class="fas fa-train brand-image ml-3"></i>
        <span class="brand-text font-weight-bold">RailJet Admin</span>
    </a>

    <div class="sidebar">
        <nav class="mt-3">
            <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview">
                <li class="nav-item">
                    <a th:href="@{/admin}" class="nav-link" th:classappend="${activeMenu == 'dashboard'} ? 'active'">
                        <i class="nav-icon fas fa-chart-line"></i><p>Tổng quan</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/users}" class="nav-link" th:classappend="${activeMenu == 'users'} ? 'active'">
                        <i class="nav-icon fas fa-users"></i><p>Quản lý User</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/passengers}" class="nav-link" th:classappend="${activeMenu == 'passengers'} ? 'active'">
                        <i class="nav-icon fas fa-user-tag"></i><p>Hành khách</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/stations}" class="nav-link" th:classappend="${activeMenu == 'stations'} ? 'active'">
                        <i class="nav-icon fas fa-map-marker-alt"></i><p>Nhà ga</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/routes}" class="nav-link" th:classappend="${activeMenu == 'routes'} ? 'active'">
                        <i class="nav-icon fas fa-route"></i><p>Tuyến đường</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/trains}" class="nav-link" th:classappend="${activeMenu == 'trains'} ? 'active'">
                        <i class="nav-icon fas fa-train"></i><p>Tàu</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/coaches}" class="nav-link" th:classappend="${activeMenu == 'coaches'} ? 'active'">
                        <i class="nav-icon fas fa-subway"></i><p>Toa tàu</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/seats}" class="nav-link" th:classappend="${activeMenu == 'seats'} ? 'active'">
                        <i class="nav-icon fas fa-chair"></i><p>Ghế</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/trips}" class="nav-link" th:classappend="${activeMenu == 'trips'} ? 'active'">
                        <i class="nav-icon fas fa-calendar-alt"></i><p>Chuyến tàu</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/bookings}" class="nav-link" th:classappend="${activeMenu == 'bookings'} ? 'active'">
                        <i class="nav-icon fas fa-ticket-alt"></i><p>Đặt vé</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/payments}" class="nav-link" th:classappend="${activeMenu == 'payments'} ? 'active'">
                        <i class="nav-icon fas fa-credit-card"></i><p>Thanh toán</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/invoices}" class="nav-link" th:classappend="${activeMenu == 'invoices'} ? 'active'">
                        <i class="nav-icon fas fa-file-invoice"></i><p>Hóa đơn</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/refunds}" class="nav-link" th:classappend="${activeMenu == 'refunds'} ? 'active'">
                        <i class="nav-icon fas fa-undo"></i><p>Hoàn tiền</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/reports}" class="nav-link" th:classappend="${activeMenu == 'reports'} ? 'active'">
                        <i class="nav-icon fas fa-chart-pie"></i><p>Báo cáo</p>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</aside>
