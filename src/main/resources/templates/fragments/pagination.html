<!-- templates/fragments/pagination.html -->
<nav xmlns:th="http://www.thymeleaf.org" th:fragment="pagination(page)" th:if="${page != null and page.totalPages > 1}">
    <ul class="pagination justify-content-end railjet-pagination">
        <li class="page-item" th:classappend="${page.first} ? ' disabled'">
            <a class="page-link" th:href="@{''(page=${page.number - 1})}">Previous / Trước</a>
        </li>

        <li class="page-item"
            th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
            th:classappend="${i == page.number} ? ' active'">
            <a class="page-link" th:href="@{''(page=${i})}" th:text="${i + 1}">1</a>
        </li>

        <li class="page-item" th:classappend="${page.last} ? ' disabled'">
            <a class="page-link" th:href="@{''(page=${page.number + 1})}">Next / Sau</a>
        </li>
    </ul>
</nav>
