<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/_admin_layout}">

<head>
    <title>Quản Lý Tàu</title>
</head>

<body>
<div layout:fragment="content">

    <h2>Quản Lý Tàu</h2>

    <div th:if="${successMessage}" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div>
        <a th:href="@{/trains/new}">
            Thêm Tàu Mới
        </a>
    </div>

    <table border="1">
        <thead>
        <tr>
            <th>ID</th>
            <th>Mã Tàu</th>
            <th>Tên Tàu</th>
            <th>Sức Chứa (Tổng)</th>
            <th>Trạng Thái</th>
            <th>Hành Động</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="train : ${trains}">
            <td th:text="${train.id}"></td>
            <td th:text="${train.code}"></td>
            <td th:text="${train.name}"></td>
            <td th:text="${train.getTotalCapacity() + ' ghế'}"></td>

            <td>
                <span th:text="${train.status.description}">
                </span>
            </td>

            <td>
                <a th:href="@{/carriages(trainId=${train.id})}">
                    Quản lý Toa
                </a>

                <a th:href="@{/trains/edit/{id}(id=${train.id})}">
                    Sửa Tàu
                </a>

                <a th:href="@{/trains/delete/{id}(id=${train.id})}"
                   onclick="return confirm('Bạn có chắc chắn muốn xóa tàu này?')">
                    Xóa Tàu
                </a>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(trains)}">
            <td colspan="6">
                Không tìm thấy tàu nào.
            </td>
        </tr>
        </tbody>
    </table>

    <br>

    <a th:href="@{/admin/dashboard}">
        Quay Lại Dashboard
    </a>

</div>
</body>
</html>
