<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/_admin_layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${train.id == null ? 'Thêm Tàu Mới' : 'Cập Nhật Tàu'}">
        From Tàu
    </title>
</head>
<body>
<div layout:fragment="content">

    <h2 th:text="${train.id == null ? 'Thêm Tàu Mới' : 'Cập Nhật Tàu'}">
        Form Tàu
    </h2>

    <div th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <form th:action="@{/trains/save}" th:object="${train}" method="POST">

        <input type="hidden" th:field="*{id}" />

        <div>
            <label for="code">Mã Tàu (Code)</label>
            <input type="text"
                   th:field="*{code}"
                   id="code"
                   required>

            <div th:if="${#fields.hasErrors('code')}"
                 th:errors="*{code}">
            </div>
        </div>

        <div>
            <label for="name">Tên Tàu</label>
            <input type="text"
                   th:field="*{name}"
                   id="name"
                   required>

            <div th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">
            </div>
        </div>

        <div>
            <label for="status">Trạng Thái</label>

            <select th:field="*{status}" id="status">
                <option th:each="s : ${allTrainStatus}"
                        th:value="${s}"
                        th:text="${s.description}">
                </option>
            </select>
        </div>

        <div>
            <button type="submit">Lưu Tàu</button>
            <a th:href="@{/trains}">Quay về danh sách</a>
        </div>

    </form>
</div>
</body>
</html>
