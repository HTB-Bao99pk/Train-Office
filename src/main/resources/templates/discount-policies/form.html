<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout('Discount Policy Form', ~{::section}, 'discounts')}">
<section>
    <div class="admin-page-hero">
        <div>
            <span class="admin-page-kicker">
                <i class="fas fa-percent mr-1"></i>
                Fare Policy
            </span>

            <h2 th:text="${policy.policyId == null ? 'Create Discount Policy' : 'Update Discount Policy'}">
                Discount Policy Form
            </h2>

            <p>Configure passenger age range and discount percentage.</p>
        </div>

        <a class="btn btn-outline-primary" th:href="@{/admin/discount-policies}">
            <i class="fas fa-arrow-left mr-1"></i>
            Back to policies
        </a>
    </div>

    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card admin-form-card">
        <div class="card-header">
            <span class="admin-card-title">Policy Information</span>
            <small>Example: Senior 2026, age 63+, discount 70%.</small>
        </div>

        <form th:action="@{/admin/discount-policies/save}" th:object="${policy}" method="post">
            <input type="hidden" th:field="*{policyId}">

            <div class="card-body">
                <div class="row">
                    <div class="col-lg-3 mb-3">
                        <label class="form-label">Policy Code</label>
                        <input class="form-control"
                               th:field="*{policyCode}"
                               placeholder="SENIOR"
                               required>
                    </div>

                    <div class="col-lg-5 mb-3">
                        <label class="form-label">Policy Name</label>
                        <input class="form-control"
                               th:field="*{policyName}"
                               placeholder="Senior Citizen"
                               required>
                    </div>

                    <div class="col-lg-2 mb-3">
                        <label class="form-label">Display Order</label>
                        <input class="form-control"
                               type="number"
                               min="1"
                               th:field="*{displayOrder}">
                    </div>

                    <div class="col-lg-2 mb-3">
                        <label class="form-label">Active</label>
                        <select class="form-control" th:field="*{active}">
                            <option th:value="true">Active</option>
                            <option th:value="false">Inactive</option>
                        </select>
                    </div>

                    <div class="col-lg-3 mb-3">
                        <label class="form-label">Min Age</label>
                        <input class="form-control"
                               type="number"
                               min="0"
                               th:field="*{minAge}"
                               required>
                    </div>

                    <div class="col-lg-3 mb-3">
                        <label class="form-label">Max Age</label>
                        <input class="form-control"
                               type="number"
                               min="0"
                               th:field="*{maxAge}"
                               placeholder="Empty = no limit">
                    </div>

                    <div class="col-lg-3 mb-3">
                        <label class="form-label">Discount Percent</label>
                        <div class="input-group">
                            <input class="form-control"
                                   type="number"
                                   min="0"
                                   max="100"
                                   step="0.01"
                                   th:field="*{discountPercent}"
                                   required>
                            <div class="input-group-append">
                                <span class="input-group-text">%</span>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-12 mb-3">
                        <label class="form-label">Description</label>
                        <input class="form-control"
                               th:field="*{description}"
                               placeholder="Optional note">
                    </div>
                </div>
            </div>

            <div class="card-footer d-flex justify-content-end gap-2">
                <a class="btn btn-outline-secondary" th:href="@{/admin/discount-policies}">
                    Cancel
                </a>

                <button class="btn btn-primary" type="submit">
                    <i class="fas fa-save mr-1"></i>
                    Save Policy
                </button>
            </div>
        </form>
    </div>
</section>
</html>
