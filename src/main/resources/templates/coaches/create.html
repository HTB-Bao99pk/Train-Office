<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin-layout}">
<head><title>Create Coach</title></head>
<body>
<section layout:fragment="content" class="content-wrapper p-3">
    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="content-header">
        <div class="container-fluid">
            <h1>Create Coach</h1>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                <li class="breadcrumb-item"><a th:href="@{/admin/coaches}">Coaches</a></li>
                <li class="breadcrumb-item active">Create</li>
            </ol>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">
            <div class="card card-primary card-outline">
                <form th:action="@{/admin/coaches/create}" method="post" th:object="${coachForm}">
                    <div class="card-body">

                        <div class="mb-3">
                            <label for="trainId" class="form-label">Train / Tàu</label>
                            <select id="trainId" th:field="*{trainId}" class="form-select">
                                <option value="">-- Select Train --</option>
                                <option th:each="train : ${trains}"
                                        th:value="${train.trainId}"
                                        th:text="${train.trainCode + ' - ' + train.trainName}">
                                    SE1 - Express
                                </option>
                            </select>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('trainId')}"
                                 th:errors="*{trainId}">Train error</div>
                        </div>

                        <div class="mb-3">
                            <label for="coachNumber" class="form-label">Coach Number / Số toa</label>
                            <input id="coachNumber" type="text" th:field="*{coachNumber}"
                                   class="form-control" placeholder="VD: C01">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('coachNumber')}"
                                 th:errors="*{coachNumber}">Coach number error</div>
                        </div>

                        <div class="mb-3">
                            <label for="coachType" class="form-label">Coach Type / Loại toa</label>
                            <select id="coachType" th:field="*{coachType}" class="form-select">
                                <option value="">-- Select Coach Type --</option>
                                <option value="SEAT">SEAT</option>
                                <option value="SLEEPER">SLEEPER</option>
                                <option value="VIP">VIP</option>
                            </select>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('coachType')}"
                                 th:errors="*{coachType}">Coach type error</div>
                        </div>

                        <div class="mb-3">
                            <label for="capacity" class="form-label">Capacity / Sức chứa</label>
                            <input id="capacity" type="number" min="1" th:field="*{capacity}"
                                   class="form-control" placeholder="Enter capacity">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('capacity')}"
                                 th:errors="*{capacity}">Capacity error</div>
                        </div>

                    </div>

                    <div class="card-footer d-flex justify-content-between">
                        <a th:href="@{/admin/coaches}" class="btn btn-secondary">Cancel</a>
                        <button class="btn btn-primary">
                            <i class="fas fa-save"></i> Create Coach
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>
</section>
</body>
</html>
