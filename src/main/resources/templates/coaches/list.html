<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin-layout}">
<head><title>Coach Management</title></head>
<body>
<section layout:fragment="content" class="content-wrapper p-3">
    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="content-header">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div>
                <h1>Coaches / Toa tàu</h1>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="breadcrumb-item active">Coaches</li>
                </ol>
            </div>
            <a th:href="@{/admin/coaches/create}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Coach
            </a>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="row mb-3">
                <div class="col-md-3">
                    <div class="small-box bg-info">
                        <div class="inner"><h3 th:text="${totalCoaches ?: 0}">0</h3><p>Total Coaches</p></div>
                        <div class="icon"><i class="fas fa-subway"></i></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="small-box bg-success">
                        <div class="inner"><h3 th:text="${totalCapacity ?: 0}">0</h3><p>Total Capacity</p></div>
                        <div class="icon"><i class="fas fa-chair"></i></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="small-box bg-warning">
                        <div class="inner"><h3 th:text="${sleeperCoaches ?: 0}">0</h3><p>Sleeper Coaches</p></div>
                        <div class="icon"><i class="fas fa-bed"></i></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="small-box bg-danger">
                        <div class="inner"><h3 th:text="${seatCoaches ?: 0}">0</h3><p>Seat Coaches</p></div>
                        <div class="icon"><i class="fas fa-couch"></i></div>
                    </div>
                </div>
            </div>

            <div class="card card-outline card-primary">
                <div class="card-header">
                    <form th:action="@{/admin/coaches}" method="get" class="row g-2">
                        <div class="col-md-5">
                            <input type="text" name="keyword" th:value="${keyword}"
                                   class="form-control"
                                   placeholder="Search coach number, train code...">
                        </div>

                        <div class="col-md-3">
                            <select name="trainId" class="form-select">
                                <option value="">All Trains</option>
                                <option th:each="train : ${trains}"
                                        th:value="${train.trainId}"
                                        th:selected="${trainId == train.trainId}"
                                        th:text="${train.trainCode + ' - ' + train.trainName}">
                                    SE1 - Express
                                </option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <select name="coachType" class="form-select">
                                <option value="">All Types</option>
                                <option value="SEAT" th:selected="${coachType == 'SEAT'}">SEAT</option>
                                <option value="SLEEPER" th:selected="${coachType == 'SLEEPER'}">SLEEPER</option>
                                <option value="VIP" th:selected="${coachType == 'VIP'}">VIP</option>
                            </select>
                        </div>

                        <div class="col-md-2 d-grid">
                            <button class="btn btn-outline-primary">
                                <i class="fas fa-search"></i> Search
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card-body table-responsive p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Train</th>
                            <th>Coach Number</th>
                            <th>Coach Type</th>
                            <th>Capacity</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="coach : ${coaches}">
                            <td th:text="${coach.coachId}">1</td>
                            <td>
                                <span class="badge bg-primary"
                                      th:text="${coach.train != null ? coach.train.trainCode : 'N/A'}">SE1</span>
                                <span th:text="${coach.train != null ? coach.train.trainName : ''}">Express</span>
                            </td>
                            <td class="fw-semibold" th:text="${coach.coachNumber}">C01</td>
                            <td><span class="badge bg-info" th:text="${coach.coachType}">SEAT</span></td>
                            <td><span th:text="${coach.capacity}">64</span> seats</td>

                            <td class="text-end">
                                <a th:href="@{/admin/coaches/{id}(id=${coach.coachId})}" class="btn btn-sm btn-info">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:href="@{/admin/coaches/{id}/edit(id=${coach.coachId})}" class="btn btn-sm btn-warning">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <button class="btn btn-sm btn-danger"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#deleteCoachModal' + ${coach.coachId}">
                                    <i class="fas fa-trash"></i>
                                </button>

                                <div class="modal fade" th:id="'deleteCoachModal' + ${coach.coachId}" tabindex="-1">
                                    <div class="modal-dialog modal-dialog-centered">
                                        <div class="modal-content text-start">
                                            <div class="modal-header">
                                                <h5 class="modal-title">Delete Coach</h5>
                                                <button class="btn-close" data-bs-dismiss="modal"></button>
                                            </div>
                                            <div class="modal-body">
                                                Delete coach
                                                <strong th:text="${coach.coachNumber}">C01</strong>?
                                            </div>
                                            <div class="modal-footer">
                                                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                <form th:action="@{/admin/coaches/{id}/delete(id=${coach.coachId})}" method="post">
                                                    <button class="btn btn-danger">Delete</button>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(coaches)}">
                            <td colspan="6" class="text-center text-muted py-4">No coaches found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="card-footer">
                    <div th:replace="~{fragments/pagination :: pagination(${page})}"></div>
                </div>
            </div>

        </div>
    </section>
</section>
</body>
</html>
