<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Coach Management', ~{::section}, 'coaches')}">
<section>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1">Coach Management</h2>
            <p class="text-muted mb-0" th:if="${selectedTrain != null}" th:text="'Filtered by train: ' + ${selectedTrain.trainCode}">Filtered by train</p>
        </div>
        <a class="btn btn-primary" th:href="@{/admin/coaches/new(trainId=${selectedTrainId})}">
            <i class="fas fa-plus mr-1"></i>Add Coach
        </a>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card mb-3">
        <div class="card-body">
            <form th:action="@{/admin/coaches}" method="get" class="row">
                <div class="col-md-8">
                    <select class="form-control" name="trainId" onchange="this.form.submit()">
                        <option value="">All trains</option>
                        <option th:each="train : ${allTrains}"
                                th:value="${train.trainId}"
                                th:selected="${selectedTrainId != null and selectedTrainId == train.trainId}"
                                th:text="${train.trainCode + ' - ' + train.trainName}">
                        </option>
                    </select>
                </div>
                <div class="col-md-4 mt-2 mt-md-0">
                    <a class="btn btn-outline-secondary w-100" th:href="@{/admin/coaches}">Clear Filter</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body table-responsive p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Train</th>
                    <th>Coach Number</th>
                    <th>Coach Type</th>
                    <th>Capacity</th>
                    <th class="text-right">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="coach : ${coaches}">
                    <td th:text="${coach.coachId}">1</td>
                    <td th:text="${coach.train != null ? coach.train.trainCode : ''}">SE1</td>
                    <td th:text="${coach.coachNumber}">C01</td>
                    <td th:text="${coach.coachType}">SOFT_SEAT</td>
                    <td th:text="${coach.capacity}">64</td>
                    <td class="text-right">
                        <a class="btn btn-sm btn-info" th:href="@{/admin/seats(coachId=${coach.coachId})}">
                            <i class="fas fa-chair"></i>
                        </a>
                        <a class="btn btn-sm btn-warning" th:href="@{/admin/coaches/edit/{id}(id=${coach.coachId})}">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a class="btn btn-sm btn-danger"
                           th:href="@{/admin/coaches/delete/{id}(id=${coach.coachId},trainId=${selectedTrainId})}"
                           onclick="return confirm('Delete this coach?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(coaches)}">
                    <td colspan="6" class="text-center text-muted py-4">No coaches found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</html>
