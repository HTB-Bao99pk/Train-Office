<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | RailJet</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/rail-auth.css}">
</head>

<body>
<a class="auth-back" th:href="@{/booking/search}">
    <i class="bi bi-arrow-left"></i>
    Booking page
</a>

<main class="auth-page">
    <section class="auth-card">
        <div class="auth-brand">
            <h1>RailJet</h1>
            <p>Technological Elegance</p>
        </div>

        <div class="auth-alert error"
             th:if="${error}"
             th:text="${error}">
            Invalid email or password.
        </div>

        <div class="auth-alert success"
             th:if="${successMessage}"
             th:text="${successMessage}">
            Action completed successfully.
        </div>

        <form class="auth-form"
              th:action="@{/login}"
              method="post">

            <div class="auth-field">
                <label for="email">Email</label>

                <div class="auth-input-wrap">
                    <i class="bi bi-envelope auth-input-icon"></i>

                    <input id="email"
                           name="email"
                           type="email"
                           class="auth-input"
                           placeholder="example@email.com"
                           required>
                </div>
            </div>

            <div class="auth-field">
                <label for="password">Password</label>

                <div class="auth-input-wrap">
                    <i class="bi bi-lock auth-input-icon"></i>

                    <input id="password"
                           name="password"
                           type="password"
                           class="auth-input password-input"
                           placeholder="••••••••"
                           required>

                    <button class="auth-toggle password-toggle"
                            type="button"
                            aria-label="Toggle password visibility">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>
            </div>

            <div class="auth-row">
                <a class="auth-link" th:href="@{/forgot-password}">
                    Forgot password?
                </a>
            </div>

            <button class="auth-btn" type="submit">
                Sign in
            </button>
        </form>

        <div class="auth-footnote">
            Do not have an account?
            <a class="auth-link" th:href="@{/register}">
                Create one
            </a>
        </div>
    </section>
</main>

<script th:src="@{/js/rail-auth.js}"></script>
</body>
</html>
