<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{customer-layout}">
<head>
    <title>Login | RailJet</title>
</head>

<body>
<section layout:fragment="content" class="auth-page py-5">
    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="container">
        <div class="row align-items-center g-5 min-vh-75">

            <div class="col-lg-6">
                <div class="auth-card p-4 p-md-5 bg-white rounded-4 shadow-sm">
                    <div class="mb-4">
                        <span class="badge text-bg-primary mb-3">RailJet Account</span>
                        <h1 class="fw-bold mb-2">Đăng nhập / Login</h1>
                        <p class="text-muted mb-0">
                            Chào mừng bạn quay lại. Manage your train booking easily.
                        </p>
                    </div>

                    <form th:action="@{/login}" method="post" th:object="${loginRequest}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Tên đăng nhập / Username</label>
                            <input type="text"
                                   id="username"
                                   th:field="*{username}"
                                   class="form-control form-control-lg"
                                   placeholder="Enter username"
                                   autocomplete="username">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('username')}"
                                 th:errors="*{username}">
                                Username error
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Mật khẩu / Password</label>
                            <input type="password"
                                   id="password"
                                   th:field="*{password}"
                                   class="form-control form-control-lg"
                                   placeholder="Enter password"
                                   autocomplete="current-password">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}">
                                Password error
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input"
                                       type="checkbox"
                                       id="rememberMe"
                                       name="remember-me">
                                <label class="form-check-label" for="rememberMe">
                                    Ghi nhớ / Remember me
                                </label>
                            </div>

                            <a th:href="@{/forgot-password}" class="text-decoration-none">
                                Quên mật khẩu?
                            </a>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            Đăng nhập / Login
                        </button>

                        <p class="text-center text-muted mt-4 mb-0">
                            Chưa có tài khoản?
                            <a th:href="@{/register}" class="fw-semibold text-decoration-none">
                                Register now
                            </a>
                        </p>
                    </form>
                </div>
            </div>

            <div class="col-lg-6 d-none d-lg-block">
                <div class="auth-hero position-relative rounded-4 overflow-hidden shadow-sm">
                    <img th:src="@{/images/train-auth.jpg}"
                         src="/images/train-auth.jpg"
                         alt="RailJet train"
                         class="img-fluid w-100 h-100 object-fit-cover">

                    <div class="auth-hero-overlay position-absolute top-0 start-0 w-100 h-100"></div>

                    <div class="position-absolute bottom-0 start-0 p-5 text-white">
                        <h2 class="fw-bold">Fast booking, smooth journey.</h2>
                        <p class="mb-0">
                            Đặt vé tàu nhanh chóng, an toàn và tiện lợi.
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
</body>
</html>
