<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu | RailJet</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root{
            --rj-bg:#051424;
            --rj-card:rgba(18,33,49,.50);
            --rj-text:#d4e4fa;
            --rj-muted:#bdc8d1;
            --rj-primary:#38bdf8;
            --rj-primary-soft:#8ed5ff;
            --rj-border:rgba(255,255,255,.14);
            --rj-danger:#ffb4ab;
            --rj-success:#34d399;
        }

        *{
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            margin:0;
            color:var(--rj-text);
            font-family:Inter, "Segoe UI", Arial, sans-serif;
            background:
                    linear-gradient(90deg,rgba(5,20,36,.86),rgba(5,20,36,.70)),
                    url('https://images.unsplash.com/photo-1474487548417-781cb71495f3?auto=format&fit=crop&w=1800&q=80') center/cover fixed;
            overflow-x:hidden;
        }

        body::before{
            content:"";
            position:fixed;
            inset:0;
            z-index:-1;
            background:
                    radial-gradient(circle at 50% 38%,rgba(56,189,248,.10),transparent 24%),
                    linear-gradient(180deg,rgba(5,20,36,.18),rgba(1,15,31,.92));
        }

        .auth-page{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:40px 16px;
        }

        .auth-card{
            width:min(100%,480px);
            padding:30px;
            border:1px solid var(--rj-border);
            border-radius:24px;
            background:var(--rj-card);
            backdrop-filter:blur(18px);
            box-shadow:0 24px 80px rgba(0,0,0,.32);
            text-align:center;
        }

        .auth-icon{
            width:70px;
            height:70px;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:0 auto 22px;
            border-radius:50%;
            color:var(--rj-primary-soft);
            background:rgba(255,255,255,.07);
            border:1px solid rgba(255,255,255,.14);
            font-size:34px;
            box-shadow:inset 0 0 18px rgba(56,189,248,.08);
        }

        .auth-title{
            margin:0;
            color:#fff;
            font-size:34px;
            font-weight:900;
            letter-spacing:-.045em;
        }

        .auth-subtitle{
            max-width:390px;
            margin:12px auto 28px;
            color:var(--rj-muted);
            font-size:16px;
            line-height:1.55;
            font-weight:500;
        }

        .auth-alert{
            border-radius:14px;
            padding:12px 14px;
            margin-bottom:16px;
            font-weight:700;
            font-size:14px;
            text-align:left;
        }

        .auth-alert.error{
            color:#ffd7d3;
            background:rgba(147,0,10,.35);
            border:1px solid rgba(255,180,171,.24);
        }

        .auth-alert.success{
            color:#c6f7dd;
            background:rgba(16,185,129,.16);
            border:1px solid rgba(52,211,153,.25);
        }

        .auth-form{
            display:grid;
            gap:16px;
            text-align:left;
        }

        .auth-field label{
            display:block;
            margin-bottom:8px;
            color:var(--rj-text);
            font-size:13px;
            font-weight:900;
        }

        .auth-input-wrap{
            position:relative;
        }

        .auth-input-icon{
            position:absolute;
            left:14px;
            top:50%;
            transform:translateY(-50%);
            color:var(--rj-muted);
            font-size:20px;
            pointer-events:none;
        }

        .auth-input{
            width:100%;
            min-height:56px;
            padding:0 48px;
            border:1px solid rgba(255,255,255,.16);
            border-radius:12px;
            background:#020617;
            color:var(--rj-text);
            outline:none;
            font-size:16px;
            box-shadow:inset 0 0 0 1px rgba(0,0,0,.14);
            transition:.18s ease;
        }

        .auth-input::placeholder{
            color:rgba(189,200,209,.58);
        }

        .auth-input:focus{
            border-color:var(--rj-primary);
            box-shadow:0 0 0 .2rem rgba(56,189,248,.15);
        }

        .auth-toggle{
            position:absolute;
            right:12px;
            top:50%;
            transform:translateY(-50%);
            width:34px;
            height:34px;
            display:flex;
            align-items:center;
            justify-content:center;
            border:0;
            background:transparent;
            color:var(--rj-muted);
            border-radius:8px;
        }

        .auth-toggle:hover{
            color:var(--rj-primary-soft);
            background:rgba(56,189,248,.08);
        }

        .auth-error{
            margin-top:6px;
            color:var(--rj-danger);
            font-size:13px;
            font-weight:700;
        }

        .auth-btn{
            width:100%;
            min-height:54px;
            border:0;
            border-radius:12px;
            background:var(--rj-primary);
            color:#001e2c;
            font-weight:900;
            box-shadow:0 0 24px rgba(56,189,248,.24);
            transition:.18s ease;
        }

        .auth-btn:hover{
            filter:brightness(1.07);
            box-shadow:0 0 32px rgba(56,189,248,.36);
        }

        .auth-cancel{
            width:100%;
            min-height:50px;
            display:flex;
            align-items:center;
            justify-content:center;
            margin-top:10px;
            border-radius:12px;
            border:1px solid rgba(56,189,248,.50);
            color:var(--rj-primary-soft);
            text-decoration:none;
            font-weight:900;
            transition:.18s ease;
        }

        .auth-cancel:hover{
            color:#fff;
            background:rgba(56,189,248,.08);
        }
    </style>
</head>

<body>
<main class="auth-page">
    <section class="auth-card">
        <div class="auth-icon">
            <i class="bi bi-arrow-counterclockwise"></i>
        </div>

        <h1 class="auth-title">
            Đặt lại mật khẩu
        </h1>

        <p class="auth-subtitle">
            Vui lòng nhập mật khẩu mới cho tài khoản của bạn để tiếp tục trải nghiệm cùng RailJet.
        </p>

        <div class="auth-alert success"
             th:if="${successMessage}"
             th:text="${successMessage}">
            Thành công.
        </div>

        <div class="auth-alert error"
             th:if="${errorMessage}"
             th:text="${errorMessage}">
            Có lỗi xảy ra.
        </div>

        <form class="auth-form"
              id="resetPasswordForm"
              th:action="@{/reset-password}"
              th:object="${resetPasswordForm}"
              method="post"
              autocomplete="off"
              novalidate>

            <div class="auth-field">
                <label for="password">Mật khẩu mới</label>

                <div class="auth-input-wrap">
                    <i class="bi bi-lock auth-input-icon"></i>

                    <input id="password"
                           type="password"
                           class="auth-input password-input"
                           th:field="*{password}"
                           autocomplete="new-password"
                           placeholder="••••••••"
                           required>

                    <button class="auth-toggle password-toggle"
                            type="button"
                            aria-label="Ẩn hiện mật khẩu">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>

                <div class="auth-error"
                     th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}">
                </div>
            </div>

            <div class="auth-field">
                <label for="confirmPassword">Xác nhận mật khẩu</label>

                <div class="auth-input-wrap">
                    <i class="bi bi-shield-lock auth-input-icon"></i>

                    <input id="confirmPassword"
                           type="password"
                           class="auth-input password-input"
                           th:field="*{confirmPassword}"
                           autocomplete="new-password"
                           placeholder="••••••••"
                           required>

                    <button class="auth-toggle password-toggle"
                            type="button"
                            aria-label="Ẩn hiện mật khẩu">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>

                <div class="auth-error"
                     th:if="${#fields.hasErrors('confirmPassword')}"
                     th:errors="*{confirmPassword}">
                </div>
            </div>

            <button class="auth-btn" type="submit">
                Cập nhật mật khẩu
            </button>
        </form>

        <a class="auth-cancel" th:href="@{/login}">
            Hủy
        </a>
    </section>
</main>

<script>
    document.querySelectorAll('.password-toggle').forEach(function (button) {
        button.addEventListener('click', function () {
            const input = button.closest('.auth-input-wrap').querySelector('.password-input');
            const icon = button.querySelector('i');

            if (!input || !icon) {
                return;
            }

            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye-slash';
            }
        });
    });
</script>
</body>
</html>
