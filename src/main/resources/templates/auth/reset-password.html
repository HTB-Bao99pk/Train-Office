<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/customer-layout :: layout('Change Password', ~{::section}, 'profile')}">
<section class="profile-velocity-page container">
    <div class="profile-page-header">
        <div>
            <div class="profile-eyebrow">RailJet Account</div>
            <h1 class="profile-page-title">Đổi mật khẩu</h1>
            <p class="profile-page-subtitle">UI demonstration only. Enter a new password and confirm it before continuing.</p>
        </div>
        <a class="profile-primary-action" th:href="@{/login}">
            <i class="bi bi-person-circle"></i>
            Back to Login
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-xl-8 col-lg-9">
            <div class="profile-detail-card">
                <div class="profile-detail-header">
                    <div>
                        <span class="profile-label">Account security</span>
                        <h3>New password details</h3>
                    </div>
                    <span class="profile-detail-icon">
                        <i class="bi bi-shield-lock"></i>
                    </span>
                </div>

                <div class="alert alert-success"
                     role="alert"
                     th:if="${successMessage}"
                     th:text="${successMessage}">
                </div>

                <div class="alert alert-danger"
                     role="alert"
                     th:if="${errorMessage}"
                     th:text="${errorMessage}">
                </div>
                <form id="resetPasswordForm"
                      th:action="@{/reset-password}"
                      th:object="${resetPasswordForm}"
                      method="post"
                      autocomplete="off"
                      novalidate>
                    <div class="profile-form-grid">
                        <div class="profile-form-field">
                            <label class="profile-label" for="password">New Password</label>
                            <input id="password" type="password"
                                   th:field="*{password}"
                                   autocomplete="new-password"
                                   required placeholder="Enter new password">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}">
                            </div>
                        </div>
                        <div class="profile-form-field">
                            <label class="profile-label" for="confirmPassword">Confirm New Password</label>
                            <input id="confirmPassword" type="password"
                                   th:field="*{confirmPassword}"
                                   autocomplete="new-password"
                                   required placeholder="Enter confirm new password">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('confirmPassword')}"
                                 th:errors="*{confirmPassword}">
                            </div>
                        </div>
                    </div>

                    <div class="profile-form-actions">
                        <button type="submit" class="profile-secondary-action">
                            <i class="bi bi-check2-circle"></i>
                            Save Password
                        </button>
                    </div>
                </form>
                <a class="profile-ghost-action" th:href="@{/login}">Cancel</a>
            </div>
        </div>
    </div>
</section>
</html>
