<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | RailJet</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/rail-auth.css}">
</head>

<body>
<a class="auth-back" th:href="@{/booking/search}">
    <i class="bi bi-arrow-left"></i>
    Booking page
</a>

<main class="auth-page">
    <section class="auth-card wide">
        <div class="auth-brand">
            <h1>RailJet</h1>
            <p>Technological Elegance. Start your journey.</p>
        </div>

        <div class="auth-alert error" th:if="${error}" th:text="${error}">
            Something went wrong.
        </div>

        <form class="auth-form"
              th:action="@{/register}"
              method="post"
              th:object="${registerRequest}"
              data-disable-on-submit="true">

            <div class="auth-field">
                <label for="fullName">Full name</label>

                <div class="auth-input-wrap">
                    <i class="bi bi-person auth-input-icon"></i>

                    <input id="fullName"
                           type="text"
                           class="auth-input"
                           th:field="*{fullName}"
                           placeholder="Enter your full name"
                           required>
                </div>

                <div class="auth-error"
                     th:if="${#fields.hasErrors('fullName')}"
                     th:errors="*{fullName}">
                </div>
            </div>

            <div class="auth-field">
                <label for="email">Email</label>

                <div class="auth-input-wrap">
                    <i class="bi bi-envelope auth-input-icon"></i>

                    <input id="email"
                           type="email"
                           class="auth-input"
                           th:field="*{email}"
                           placeholder="Enter your email address"
                           required>
                </div>

                <div class="auth-error"
                     th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}">
                </div>
            </div>

            <div class="auth-field">
                <label for="password">Password</label>

                <div class="auth-input-wrap">
                    <i class="bi bi-lock auth-input-icon"></i>

                    <input id="password"
                           type="password"
                           class="auth-input password-input"
                           th:field="*{password}"
                           placeholder="Create a password"
                           required>

                    <button class="auth-toggle password-toggle"
                            type="button"
                            aria-label="Toggle password visibility">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>

                <div class="auth-error"
                     th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}">
                </div>
            </div>

            <div class="auth-field">
                <label for="confirmPassword">Confirm password</label>

                <div class="auth-input-wrap">
                    <i class="bi bi-shield-lock auth-input-icon"></i>

                    <input id="confirmPassword"
                           type="password"
                           class="auth-input password-input"
                           th:field="*{confirmPassword}"
                           placeholder="Confirm your password"
                           required>

                    <button class="auth-toggle password-toggle"
                            type="button"
                            aria-label="Toggle password visibility">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>

                <div class="auth-error"
                     th:if="${#fields.hasErrors('confirmPassword')}"
                     th:errors="*{confirmPassword}">
                </div>
            </div>

            <label class="terms-row" for="terms">
                <input id="terms" type="checkbox" required>

                <span>
                    I agree to RailJet's
                    <a class="auth-link" href="javascript:void(0)">Terms of Service</a>
                    and
                    <a class="auth-link" href="javascript:void(0)">Privacy Policy</a>.
                </span>
            </label>

            <button type="submit" class="auth-btn">
                Create account
            </button>
        </form>

        <div class="auth-footnote">
            Already have an account?
            <a class="auth-link" th:href="@{/login}">Sign in instead</a>
        </div>
    </section>
</main>

<script th:src="@{/js/rail-auth.js}"></script>
</body>
</html>
