<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | RailJet</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/rail-auth.css}">
</head>

<body>
<main class="auth-page">
    <section class="auth-card center">
        <div class="auth-icon">
            <i class="bi bi-arrow-counterclockwise"></i>
        </div>

        <h1 class="auth-title">
            Forgot password?
        </h1>

        <p class="auth-subtitle">
            Enter your email address to continue to password reset.
        </p>

        <div class="auth-alert success"
             th:if="${successMessage}"
             th:text="${successMessage}">
            Request completed successfully.
        </div>

        <div class="auth-alert error"
             th:if="${errorMessage}"
             th:text="${errorMessage}">
            Email does not exist.
        </div>

        <form class="auth-form"
              id="forgotPasswordForm"
              th:action="@{/forgot-password}"
              th:object="${forgotPasswordForm}"
              method="post"
              novalidate>

            <div class="auth-field">
                <label class="uppercase" for="email">Email address</label>

                <div class="auth-input-wrap">
                    <i class="bi bi-envelope auth-input-icon"></i>

                    <input id="email"
                           type="email"
                           class="auth-input"
                           th:field="*{email}"
                           placeholder="traveler@railjet.com"
                           required>
                </div>

                <div class="auth-error"
                     th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}">
                </div>
            </div>

            <button class="auth-btn" type="submit">
                Continue
            </button>
        </form>

        <div class="auth-bottom-link">
            <a class="auth-link" th:href="@{/login}">
                <i class="bi bi-arrow-left"></i>
                Back to sign in
            </a>
        </div>
    </section>
</main>
</body>
</html>
