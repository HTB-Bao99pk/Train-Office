<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{customer-layout}">
<head>
    <title>Forgot Password | RailJet</title>
</head>

<body>
<section layout:fragment="content" class="auth-page py-5">
    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="container">
        <div class="row align-items-center g-5 min-vh-75">

            <div class="col-lg-6">
                <div class="auth-card p-4 p-md-5 bg-white rounded-4 shadow-sm">
                    <div class="mb-4">
                        <span class="badge text-bg-primary mb-3">Password Recovery</span>
                        <h1 class="fw-bold mb-2">Quên mật khẩu / Forgot password</h1>
                        <p class="text-muted mb-0">
                            Nhập email để nhận hướng dẫn đặt lại mật khẩu.
                        </p>
                    </div>

                    <form th:action="@{/forgot-password}" method="post" th:object="${forgotPasswordRequest}">
                        <div class="mb-4">
                            <label for="email" class="form-label">Email tài khoản / Account email</label>
                            <input type="email"
                                   id="email"
                                   th:field="*{email}"
                                   class="form-control form-control-lg"
                                   placeholder="example@email.com"
                                   autocomplete="email">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}">
                                Email error
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            Gửi hướng dẫn / Send reset link
                        </button>

                        <p class="text-center text-muted mt-4 mb-0">
                            Nhớ mật khẩu?
                            <a th:href="@{/login}" class="fw-semibold text-decoration-none">
                                Back to login
                            </a>
                        </p>
                    </form>
                </div>
            </div>

            <div class="col-lg-6 d-none d-lg-block">
                <div class="auth-hero position-relative rounded-4 overflow-hidden shadow-sm">
                    <img th:src="@{/images/train-auth.jpg}"
                         src="/images/train-auth.jpg"
                         alt="RailJet train"
                         class="img-fluid w-100 h-100 object-fit-cover">

                    <div class="auth-hero-overlay position-absolute top-0 start-0 w-100 h-100"></div>

                    <div class="position-absolute bottom-0 start-0 p-5 text-white">
                        <h2 class="fw-bold">Recover and continue.</h2>
                        <p class="mb-0">
                            Lấy lại quyền truy cập và tiếp tục đặt vé.
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
</body>
</html>
