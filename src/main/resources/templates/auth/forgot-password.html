<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/customer-layout :: layout('Quên mật khẩu', ~{::section}, 'home')}">
<section class="container customer-page">
    <div class="page-hero">
        <span class="page-eyebrow">RailJet Account</span>
        <h1 class="page-title">Khôi phục mật khẩu</h1>
        <p class="page-subtitle">Nhập email tài khoản để tiếp tục quy trình khôi phục.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="railjet-card card">
                <div class="card-body p-4 p-lg-5">
                    <h2 class="fw-bold mb-3" th:text="${authTitle}">Quên mật khẩu</h2>
                    <form th:action="${authAction}" method="post" th:object="${form}">
                        <div th:replace="~{fragments/form-errors :: globalErrors}"></div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input class="form-control" th:field="*{email}" placeholder="email@example.com">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error</div>
                        </div>
                        <div class="mb-3" th:if="${showEmail}">
                            <label class="form-label">Email liên hệ</label>
                            <input class="form-control" th:field="*{contactEmail}" placeholder="email@example.com">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('contactEmail')}" th:errors="*{contactEmail}">Error</div>
                        </div>
                        <div class="mb-3" th:if="${showPassword}">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" class="form-control" th:field="*{password}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Error</div>
                        </div>
                        <button class="btn btn-primary w-100" th:text="${authButton}">Gửi yêu cầu</button>
                    </form>
                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/login}">Đăng nhập</a>
                        <a th:href="@{/register}">Đăng ký</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
