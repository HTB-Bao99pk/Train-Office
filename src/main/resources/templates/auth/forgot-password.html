<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/customer-layout :: layout('Forgot Password / Quên mật khẩu', ~{::section}, 'home')}">
<section class="container">
<div class="row justify-content-center"><div class="col-lg-6"><div class="railjet-card card"><div class="card-body p-4 p-lg-5"><span class="badge text-bg-primary mb-3">RailJet Account</span><h1 class="fw-bold mb-3" th:text="${authTitle}">Login / Đăng nhập</h1><form th:action="${authAction}" method="post" th:object="${form}"><div th:replace="~{fragments/form-errors :: globalErrors}"></div><div class="mb-3"><label class="form-label">Email</label><input class="form-control" th:field="*{email}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error</div></div><div class="mb-3" th:if="${showEmail}"><label class="form-label">Contact email</label><input class="form-control" th:field="*{contactEmail}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('contactEmail')}" th:errors="*{contactEmail}">Error</div></div><div class="mb-3" th:if="${showPassword}"><label class="form-label">Password / Mật khẩu</label><input type="password" class="form-control" th:field="*{password}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Error</div></div><button class="btn btn-primary w-100" th:text="${authButton}">Submit</button></form><div class="d-flex justify-content-between mt-3"><a th:href="@{/login}">Login</a><a th:href="@{/register}">Register</a><a th:href="@{/forgot-password}">Forgot?</a></div></div></div></div></div>
</section>
</html>
