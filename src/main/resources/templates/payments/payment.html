<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/customer-layout :: layout('Thanh toán', ~{::section}, 'booking')}">
<section class="container customer-page">
    <div class="page-hero">
        <span class="page-eyebrow">Thanh toán</span>
        <h1 class="page-title">Chọn phương thức thanh toán</h1>
        <p class="page-subtitle">Hoàn tất thanh toán để xác nhận vé và nhận mã vé.</p>
    </div>

    <form th:action="@{/payments/process}" method="post" th:object="${form}">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="railjet-card card">
                    <div class="card-header">Phương thức thanh toán</div>
                    <div class="card-body row g-3 p-4">
                        <div class="col-md-6" th:each="method : ${paymentMethods}">
                            <input class="btn-check" type="radio" th:field="*{paymentMethod}" th:value="${method}" th:id="${'method-' + method}">
                            <label class="method-option" th:for="${'method-' + method}">
                                <strong th:text="${method}">BANK_TRANSFER</strong>
                                <br>
                                <small class="text-muted">Thanh toán an toàn qua RailJet</small>
                            </label>
                        </div>
                        <div class="text-danger small" th:if="${#fields.hasErrors('paymentMethod')}" th:errors="*{paymentMethod}">Error</div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="railjet-card card">
                    <div class="card-header">Tóm tắt</div>
                    <div class="card-body">
                        <div class="summary-box mb-3">
                            <div class="text-muted">Tổng tiền</div>
                            <h2 class="h4 fw-bold mb-0">900,000 VND</h2>
                        </div>
                        <button class="btn btn-primary w-100">Thanh toán ngay</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</section>
</html>
