<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/customer-layout :: layout('Payment / Thanh toán', ~{::section}, 'payments')}">
<section class="container">
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div><form th:action="@{/payments/process}" method="post" th:object="${form}"><div class="row g-4"><div class="col-lg-8"><div class="railjet-card card"><div class="card-header">Payment method / Phương thức</div><div class="card-body row g-3"><div class="col-md-6" th:each="method : ${paymentMethods}"><input class="btn-check" type="radio" th:field="*{paymentMethod}" th:value="${method}" th:id="${'method-' + method}"><label class="border rounded-3 p-3 w-100" th:for="${'method-' + method}"><strong th:text="${method}">VNPAY</strong><br><small>Secure payment / Thanh toán an toàn</small></label></div><div class="text-danger small" th:if="${#fields.hasErrors('paymentMethod')}" th:errors="*{paymentMethod}">Error</div></div></div></div><div class="col-lg-4"><div class="railjet-card card"><div class="card-header">Summary / Tóm tắt</div><div class="card-body"><h4>900,000 VND</h4><button class="btn btn-primary w-100">Pay now / Thanh toán</button></div></div></div></div></form>
</section>
</html>
