<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/customer-layout :: layout('Payment Failed / Thanh toán thất bại', ~{::section}, 'payments')}">
<section class="container">
    <div class="railjet-card card text-center">
        <div class="card-body py-5">
            <i class="bi bi-x-circle-fill text-danger display-3"></i>
            <h1 class="fw-bold mt-3">Thanh toán thất bại / Payment failed</h1>
            <p class="text-muted" th:text="${errorMessage ?: 'Please try another payment method.'}">Please try again.</p>
            <a class="btn btn-primary" th:href="@{/payments/{id}(id=${booking.bookingId})}">Try again / Thử lại</a>
        </div>
    </div>
</section>
</html>
