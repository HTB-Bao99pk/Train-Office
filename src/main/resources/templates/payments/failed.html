<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/customer-layout :: layout('Payment Failed', ~{::section}, 'booking')}">

<section class="rail-payment-page rail-payment-failed-page">
    <link rel="stylesheet" th:href="@{/css/rail-payment.css}">

    <div class="rail-payment-shell">
        <div class="rail-payment-card rail-payment-result-card rail-payment-result-failed">
            <div class="rail-payment-status-icon rail-payment-status-failed">
                <i class="bi bi-exclamation-circle"></i>
            </div>

            <h1 class="rail-payment-title">Payment Failed</h1>
            <p class="rail-payment-subtitle">
                Payment was not completed. Please try again or choose another payment method.
            </p>

            <div class="rail-payment-summary-box">
                <div class="rail-payment-summary-row">
                    <span>Booking Number</span>
                    <strong th:text="${bookingCode != null ? bookingCode : (booking != null ? booking.bookingCode : 'RJ1782996611446')}">RJ1782996611446</strong>
                </div>

                <div class="rail-payment-summary-row">
                    <span>Status</span>
                    <strong class="rail-payment-status-text rail-payment-status-text-failed"
                            th:text="${paymentStatus != null ? paymentStatus : 'PENDING_PAYMENT'}">PENDING_PAYMENT</strong>
                </div>
            </div>

            <a class="rail-payment-primary-btn"
               th:href="@{/payments}">
                Retry Payment
            </a>

            <div class="rail-payment-action-row">
                <a class="rail-payment-secondary-btn"
                   th:href="@{/booking/history}">
                    My Bookings
                </a>

                <a class="rail-payment-secondary-btn"
                   th:href="@{/support}">
                    Support
                </a>
            </div>
        </div>
    </div>
</section>
</html>
