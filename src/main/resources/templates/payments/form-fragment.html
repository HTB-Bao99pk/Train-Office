<div xmlns:th="http://www.thymeleaf.org" th:fragment="paymentForm(title)">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title" th:text="${title}">Payment Form</h3>
        </div>

        <form th:action="@{/admin/payments/save}" th:object="${payment}" method="post">
            <div class="card-body">
                <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                <input type="hidden" th:field="*{paymentId}">

                <div class="form-group">
                    <label for="bookingId">Booking</label>
                    <select id="bookingId" class="form-control" name="bookingId" required>
                        <option value="">Select booking</option>
                        <option th:each="booking : ${allBookings}"
                                th:value="${booking.bookingId}"
                                th:selected="${payment.booking != null and payment.booking.bookingId == booking.bookingId}"
                                th:text="${booking.bookingNumber}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="paymentMethod">Payment Method</label>
                    <select id="paymentMethod" class="form-control" th:field="*{paymentMethod}" required>
                        <option value="">Select method</option>
                        <option th:each="method : ${paymentMethods}" th:value="${method}" th:text="${method}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input id="amount" type="number" step="0.01" min="0" class="form-control" th:field="*{amount}" required>
                    <div class="text-danger small" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
                </div>

                <div class="form-group">
                    <label for="transactionCode">Transaction Code</label>
                    <input id="transactionCode" class="form-control" th:field="*{transactionCode}">
                </div>

                <div class="form-group">
                    <label for="otpCode">OTP Code</label>
                    <input id="otpCode" class="form-control" th:field="*{otpCode}">
                </div>

                <div class="form-group">
                    <label for="paymentStatus">Payment Status</label>
                    <select id="paymentStatus" class="form-control" th:field="*{paymentStatus}">
                        <option value="">Default</option>
                        <option th:each="status : ${paymentStatuses}" th:value="${status}" th:text="${status}"></option>
                    </select>
                </div>
            </div>

            <div class="card-footer d-flex justify-content-between">
                <a class="btn btn-secondary" th:href="@{/admin/payments}">Back</a>
                <button class="btn btn-primary" type="submit">Save</button>
            </div>
        </form>
    </div>
</div>
