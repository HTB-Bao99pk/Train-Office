<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Payment Management', ~{::section}, 'payments')}">
<section>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1">Payment Management</h2>
            <p class="text-muted mb-0">Manage booking payments and statuses.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/admin/payments/new}">
            <i class="fas fa-plus mr-1"></i>Add Payment
        </a>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card mb-3">
        <div class="card-body">
            <form th:action="@{/admin/payments}" method="get" class="row">
                <div class="col-md-4">
                    <select class="form-control" name="status">
                        <option value="">All statuses</option>
                        <option th:each="status : ${paymentStatuses}"
                                th:value="${status}"
                                th:selected="${selectedStatus != null and selectedStatus == status}"
                                th:text="${status}">
                        </option>
                    </select>
                </div>
                <div class="col-md-4 mt-2 mt-md-0">
                    <input class="form-control" type="number" name="bookingId" placeholder="Booking ID" th:value="${selectedBookingId}">
                </div>
                <div class="col-md-2 mt-2 mt-md-0">
                    <button class="btn btn-primary w-100" type="submit">Filter</button>
                </div>
                <div class="col-md-2 mt-2 mt-md-0">
                    <a class="btn btn-outline-secondary w-100" th:href="@{/admin/payments}">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body table-responsive p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Booking</th>
                    <th>Method</th>
                    <th>Amount</th>
                    <th>Transaction</th>
                    <th>OTP</th>
                    <th>Status</th>
                    <th>Paid At</th>
                    <th class="text-right">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="payment : ${payments}">
                    <td th:text="${payment.paymentId}">1</td>
                    <td th:text="${payment.booking != null ? payment.booking.bookingNumber : ''}">RJ0001</td>
                    <td th:text="${payment.paymentMethod}">BANK_TRANSFER</td>
                    <td th:text="${payment.amount}">0</td>
                    <td th:text="${payment.transactionCode}">TXN</td>
                    <td th:text="${payment.otpCode}">OTP</td>
                    <td><span th:replace="~{fragments/status-badge :: statusBadge(${payment.paymentStatus})}"></span></td>
                    <td th:text="${payment.paidAt}">Paid At</td>
                    <td class="text-right">
                        <a class="btn btn-sm btn-info" th:href="@{/admin/payments/detail/{id}(id=${payment.paymentId})}">
                            <i class="fas fa-eye"></i>
                        </a>
                        <a class="btn btn-sm btn-warning" th:href="@{/admin/payments/edit/{id}(id=${payment.paymentId})}">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a class="btn btn-sm btn-success" th:href="@{/admin/payments/success/{id}(id=${payment.paymentId})}">
                            <i class="fas fa-check"></i>
                        </a>
                        <a class="btn btn-sm btn-secondary" th:href="@{/admin/payments/failed/{id}(id=${payment.paymentId})}">
                            <i class="fas fa-times"></i>
                        </a>
                        <a class="btn btn-sm btn-danger"
                           th:href="@{/admin/payments/delete/{id}(id=${payment.paymentId})}"
                           onclick="return confirm('Delete this payment?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(payments)}">
                    <td colspan="9" class="text-center text-muted py-4">No payments found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</html>
