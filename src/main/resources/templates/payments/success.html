<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/customer-layout :: layout('Payment Success / Thanh toán thành công', ~{::section}, 'payments')}">
<section class="container">
    <div class="railjet-card card text-center">
        <div class="card-body py-5">
            <i class="bi bi-credit-card-2-front-fill text-success display-3"></i>
            <h1 class="fw-bold mt-3">Thanh toán thành công / Payment successful</h1>
            <p class="text-muted">Transaction: <strong th:text="${payment.transactionCode}">TXN001</strong></p>
            <a class="btn btn-primary" th:href="@{/invoices/{id}(id=${invoice.invoiceId})}">View invoice / Xem hóa đơn</a>
        </div>
    </div>
</section>
</html>
