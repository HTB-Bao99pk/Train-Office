<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Seat Type Management', ~{::section}, 'seat-types')}">
<section>

    <div class="container-fluid">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
                <h2 class="fw-bold text-primary">
                    Seat Type Management
                </h2>

                <p class="text-muted mb-0">
                    Manage all seat types in the system.
                </p>
            </div>

            <a th:href="@{/seat-types/new}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i>
                Add Seat Type
            </a>

        </div>


        <!-- Success -->
        <div class="alert alert-success alert-dismissible fade show"
             th:if="${successMessage}">

            <span th:text="${successMessage}"></span>

            <button class="btn-close"
                    data-bs-dismiss="alert"></button>

        </div>


        <!-- Error -->
        <div class="alert alert-danger alert-dismissible fade show"
             th:if="${errorMessage}">

            <span th:text="${errorMessage}"></span>

            <button class="btn-close"
                    data-bs-dismiss="alert"></button>

        </div>


        <!-- Card -->

        <div class="card shadow-sm border-0">

            <div class="card-header bg-primary text-white">

                <h5 class="mb-0">
                    Seat Type List
                </h5>

            </div>

            <div class="card-body p-0">

                <div class="table-responsive">

                    <table class="table table-hover table-striped align-middle mb-0">

                        <thead class="table-light">

                        <tr>

                            <th width="10%">ID</th>

                            <th>Name</th>

                            <th>Price / Km</th>

                            <th width="18%" class="text-center">
                                Actions
                            </th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="seatType : ${seatTypes}">

                            <td th:text="${seatType.id}"></td>

                            <td th:text="${seatType.name}"></td>

                            <td>

                                <span class="badge bg-success"
                                      th:text="${seatType.pricePerKm}">
                                </span>

                            </td>

                            <td class="text-center">

                                <a class="btn btn-warning btn-sm"
                                   th:href="@{'/seat-types/edit/' + ${seatType.id}}">

                                    <i class="bi bi-pencil-square"></i>

                                    Edit

                                </a>

                                <a class="btn btn-danger btn-sm"
                                   onclick="return confirm('Delete this seat type?')"
                                   th:href="@{'/seat-types/delete/' + ${seatType.id}}">

                                    <i class="bi bi-trash"></i>

                                    Delete

                                </a>

                            </td>

                        </tr>

                        <tr th:if="${#lists.isEmpty(seatTypes)}">

                            <td colspan="4"
                                class="text-center text-muted py-5">

                                No seat types found.

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</section>

</html>
