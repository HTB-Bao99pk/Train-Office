<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/customer-layout :: layout('Change Password', ~{::section}, 'profile')}">
<section class="profile-velocity-page container">
    <div class="profile-page-header">
        <div>
            <div class="profile-eyebrow">RailJet Account</div>
            <h1 class="profile-page-title">Đổi mật khẩu</h1>
            <p class="profile-page-subtitle">UI demonstration only. Enter a new password and confirm it before continuing.</p>
        </div>
        <a class="profile-primary-action" th:href="@{/profile}">
            <i class="bi bi-person-circle"></i>
            Back to Profile
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-xl-8 col-lg-9">
            <div class="profile-detail-card">
                <div class="profile-detail-header">
                    <div>
                        <span class="profile-label">Account security</span>
                        <h3>New password details</h3>
                    </div>
                    <span class="profile-detail-icon">
                        <i class="bi bi-shield-lock"></i>
                    </span>
                </div>

                <div class="alert alert-success"
                     role="alert"
                     th:if="${successMessage}"
                     th:text="${successMessage}">
                </div>

                <div class="alert alert-danger"
                     role="alert"
                     th:if="${errorMessage}"
                     th:text="${errorMessage}">
                </div>

                <form id="changePasswordForm"
                      th:action="@{/change-password}"
                      th:object="${changePasswordForm}"
                      method="post"
                      autocomplete="off"
                      novalidate>
                    <div class="profile-form-grid">
                        <div class="profile-form-field">
                            <label class="profile-label" for="currentPassword">Current Password</label>
                            <input id="currentPassword" type="password"
                                   th:field="*{currentPassword}"
                                   placeholder="Enter current password">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('currentPassword')}"
                                 th:errors="*{currentPassword}">
                            </div>
                        </div>
                        <div class="profile-form-field">
                            <label class="profile-label" for="newPassword">New Password</label>
                            <input id="newPassword" type="password"
                                   th:field="*{newPassword}" placeholder="Enter new password">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('newPassword')}"
                                 th:errors="*{newPassword}">
                            </div>
                        </div>
                        <div class="profile-form-field">
                            <label class="profile-label" for="confirmNewPassword">Confirm New Password</label>
                            <input id="confirmNewPassword" type="password"
                                   th:field="*{confirmNewPassword}" placeholder="Enter confirm new password">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('confirmNewPassword')}"
                                 th:errors="*{confirmNewPassword}">
                            </div>
                        </div>
                    </div>

                    <div class="profile-form-actions">
                        <a class="profile-ghost-action" th:href="@{/profile}">Cancel</a>
                        <button type="submit" class="profile-secondary-action">
                            <i class="bi bi-check2-circle"></i>
                            Save Password
                        </button>
                    </div>
                </form>

                <a class="profile-ghost-action" th:href="@{/profile}">Cancel</a>
            </div>
        </div>
    </div>

</section>
</html>
