<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/customer-layout :: layout('Change Password', ~{::section}, 'profile')}">

<section class="rail-profile-page">
    <link rel="stylesheet" th:href="@{/css/rail-profile.css}">

    <div class="rail-profile-container">
        <header class="rail-profile-hero">
            <h1>Account Profile</h1>
            <p>Manage your personal information and account security.</p>
        </header>

        <div class="rail-profile-top-grid">
            <div class="rail-glass-card rail-profile-user-card">
                <div class="rail-profile-avatar">
                    <span th:text="${currentUser != null and currentUser.fullName != null and !#strings.isEmpty(currentUser.fullName) ? #strings.substring(currentUser.fullName, 0, 1) : 'R'}">
                        R
                    </span>
                </div>

                <div class="rail-profile-user-info">
                    <h2 th:text="${currentUser != null and currentUser.fullName != null and !#strings.isEmpty(currentUser.fullName) ? currentUser.fullName : (currentUser != null ? currentUser.email : 'RailJet User')}">
                        RailJet User
                    </h2>

                    <div class="rail-profile-chip-row">
                        <span class="rail-profile-chip success">
                            <i class="bi bi-check-circle"></i>
                            <span th:text="${currentUser != null and currentUser.status != null ? currentUser.status : 'ACTIVE'}">
                                ACTIVE
                            </span>
                        </span>

                        <span class="rail-profile-chip neutral"
                              th:text="${currentUser != null and currentUser.role != null ? currentUser.role : 'CUSTOMER'}">
                            CUSTOMER
                        </span>
                    </div>
                </div>
            </div>

            <div class="rail-glass-card rail-profile-tier-card">
                <i class="bi bi-shield-lock"></i>
                <span class="rail-profile-label">Account Security</span>
                <strong>Password</strong>
            </div>
        </div>

        <div class="rail-glass-card rail-profile-main-card">
            <div class="rail-profile-main-header">
                <div class="rail-profile-main-title">
                    <i class="bi bi-lock"></i>
                    <h2>Change Password</h2>
                </div>

                <div class="rail-profile-actions">
                    <a class="rail-profile-btn-outline" th:href="@{/profile}">
                        <i class="bi bi-arrow-left"></i>
                        Back to Profile
                    </a>

                    <button class="rail-profile-btn" type="submit" form="changePasswordForm">
                        <i class="bi bi-save"></i>
                        Save Password
                    </button>
                </div>
            </div>

            <div class="rail-profile-body">
                <div class="rail-password-layout">
                    <div class="rail-password-header">
                        <div class="rail-password-icon">
                            <i class="bi bi-arrow-clockwise"></i>
                        </div>

                        <h2>Change Password</h2>

                        <p>
                            Update your password to keep your RailJet account secure.
                        </p>
                    </div>

                    <div class="rail-profile-alert success"
                         th:if="${successMessage}"
                         th:text="${successMessage}">
                    </div>

                    <div class="rail-profile-alert danger"
                         th:if="${errorMessage}"
                         th:text="${errorMessage}">
                    </div>

                    <form id="changePasswordForm"
                          th:action="@{/change-password}"
                          th:object="${changePasswordForm}"
                          method="post"
                          autocomplete="off">

                        <div class="rail-profile-form-grid">
                            <div class="rail-profile-field" style="grid-column: 1 / -1;">
                                <label for="currentPassword">Current Password</label>

                                <div class="rail-profile-input-wrap">
                                    <i class="bi bi-lock"></i>
                                    <input id="currentPassword"
                                           class="rail-profile-input"
                                           type="password"
                                           name="currentPassword"
                                           placeholder="Enter current password"
                                           required
                                           minlength="6">
                                </div>
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('currentPassword')}"
                                     th:errors="*{currentPassword}">
                                </div>
                            </div>

                            <div class="rail-profile-field" style="grid-column: 1 / -1;">
                                <label for="newPassword">New Password</label>

                                <div class="rail-profile-input-wrap">
                                    <i class="bi bi-key"></i>
                                    <input id="newPassword"
                                           class="rail-profile-input"
                                           type="password"
                                           name="newPassword"
                                           placeholder="Enter new password"
                                           required
                                           minlength="6">
                                </div>
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('newPassword')}"
                                     th:errors="*{newPassword}">
                                </div>

                            </div>

                            <div class="rail-profile-field" style="grid-column: 1 / -1;">
                                <label for="confirmNewPassword">Confirm New Password</label>

                                <div class="rail-profile-input-wrap">
                                    <i class="bi bi-check-circle"></i>
                                    <input id="confirmNewPassword"
                                           class="rail-profile-input"
                                           type="password"
                                           name="confirmNewPassword"
                                           placeholder="Re-enter new password"
                                           required
                                           minlength="6">
                                </div>
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('confirmNewPassword')}"
                                     th:errors="*{confirmNewPassword}">
                                </div>
                            </div>
                        </div>

                        <div class="rail-profile-form-actions">
                            <a class="rail-profile-btn-outline" th:href="@{/profile}">
                                Back to Profile
                            </a>

                            <button type="submit" class="rail-profile-btn">
                                <i class="bi bi-save"></i>
                                Save Password
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
