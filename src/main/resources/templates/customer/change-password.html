<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/customer-layout :: layout('Change Password', ~{::section}, 'profile')}">
<section class="profile-velocity-page container">
    <div class="profile-page-header">
        <div>
            <div class="profile-eyebrow">RailJet Account</div>
            <h1 class="profile-page-title">Change Password</h1>
            <p class="profile-page-subtitle">Create a new password for this UI-only demonstration flow.</p>
        </div>
        <a class="profile-primary-action" th:href="@{/profile}">
            <i class="bi bi-person-circle"></i>
            Back to Profile
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-xl-8 col-lg-9">
            <div class="profile-detail-card">
                <div class="profile-detail-header">
                    <div>
                        <span class="profile-label">Account security</span>
                        <h3>New password details</h3>
                    </div>
                    <span class="profile-detail-icon">
                        <i class="bi bi-shield-lock"></i>
                    </span>
                </div>

                <div id="changePasswordAlert" class="alert alert-success d-none" role="alert">
                    Password change request is ready for UI demonstration.
                </div>
                <form id="changePasswordForm" action="#" method="post" autocomplete="off" novalidate>
                    <div class="profile-form-grid">
                        <div class="profile-form-field">
                            <label class="profile-label" for="newPassword">New Password</label>
                            <input id="newPassword" name="newPassword" class="form-control" type="password"
                                   placeholder="Enter new password">
                        </div>
                        <div class="profile-form-field">
                            <label class="profile-label" for="confirmNewPassword">Confirm New Password</label>
                            <input id="confirmNewPassword" name="confirmNewPassword" class="form-control" type="password"
                                   placeholder="Confirm new password">
                        </div>
                    </div>

                    <div class="profile-form-actions">
                        <a class="profile-ghost-action" th:href="@{/profile}">Cancel</a>
                        <button type="submit" class="profile-secondary-action">
                            <i class="bi bi-check2-circle"></i>
                            Save Password
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('changePasswordForm').addEventListener('submit', function (event) {
            event.preventDefault();
            document.getElementById('changePasswordAlert').classList.remove('d-none');
        });
    </script>
</section>
</html>
