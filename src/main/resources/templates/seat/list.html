<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/_admin_layout}">

<head>
    <title>Quản Lý Ghế</title>
</head>

<body>
<div layout:fragment="content">

    <h2>Quản Lý Ghế</h2>

    <h4 th:if="${selectedCarriage != null}"
        th:text="|Toa: ${selectedCarriage.name} (Tàu ${selectedCarriage.train.code})|">
    </h4>

    <div th:if="${successMessage}" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div>
        <a th:href="@{/seats/new(carriageId=${selectedCarriageId})}"
           th:classappend="${selectedCarriageId == null} ? 'disabled' : ''">
            Thêm Ghế Mới
        </a>

        <small th:if="${selectedCarriageId == null}">
            (Vui lòng lọc theo Toa để thêm Ghế)
        </small>
    </div>

    <hr>

    <form th:action="@{/seats}" method="GET">

        <label for="carriageId">
            Lọc theo Toa (Bắt buộc)
        </label>

        <select name="carriageId" id="carriageId">
            <option value="">
                -- Chọn Toa để xem ghế --
            </option>

            <option th:each="carriage : ${allCarriages}"
                    th:value="${carriage.carriageId}"
                    th:text="|Tàu ${carriage.train.code} - ${carriage.name} (${carriage.seatType != null ? carriage.seatType.name : 'N/A'})|"
                    th:selected="${carriage.carriageId == selectedCarriageId}">
            </option>
        </select>

        <button type="submit">Lọc</button>

    </form>

    <br>

    <table border="1">
        <thead>
        <tr>
            <th>ID</th>
            <th>Số Ghế</th>
            <th>Trạng Thái</th>
            <th>Kích Hoạt</th>
            <th>Hành Động</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="seat : ${seats}">
            <td th:text="${seat.seatId}"></td>

            <td th:text="${seat.seatNumber}"></td>

            <td>
                <span th:if="${seat.status == T(com.example.trainticketoffice.common.SeatStatus).AVAILABLE}"
                      th:text="${seat.status}">
                </span>

                <span th:if="${seat.status == T(com.example.trainticketoffice.common.SeatStatus).BOOKED}"
                      th:text="${seat.status}">
                </span>
            </td>

            <td th:text="${seat.isActive ? 'Có' : 'Không'}"></td>

            <td>
                <a th:href="@{/seats/edit/{id}(id=${seat.seatId})}">
                    Sửa
                </a>

                <a th:href="@{/seats/delete/{id}(id=${seat.seatId}, carriageId=${selectedCarriageId})}"
                   onclick="return confirm('Are you sure?')">
                    Xóa
                </a>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(seats)}">
            <td colspan="5">
                Không tìm thấy ghế nào (Hoặc bạn chưa chọn Toa).
            </td>
        </tr>
        </tbody>
    </table>

    <br>

    <a th:if="${selectedCarriage != null}"
       th:href="@{/carriages(trainId=${selectedCarriage.train.id})}">
        Quay Lại Danh Sách Toa
    </a>

    <br><br>

    <a th:href="@{/admin/dashboard}">
        Quay Lại Dashboard
    </a>

</div>
</body>
</html>
