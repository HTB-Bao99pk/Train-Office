<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/_admin_layout}">

<head>
    <title th:text="${seat.seatId != null ? 'Chỉnh Sửa Ghế' : 'Thêm Mới Ghế'}">
        Seat Form
    </title>
</head>

<body>
<div layout:fragment="content">

    <h2 th:text="${seat.seatId != null ? 'Chỉnh Sửa Ghế' : 'Thêm Mới Ghế'}">
        Seat Form
    </h2>

    <div th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <form th:action="@{/seats/save}" th:object="${seat}" method="post">

        <input type="hidden" th:field="*{seatId}">

        <div>
            <label>Toa Thuộc (Carriage)</label>

            <select th:field="*{carriage}"
                    required
                    th:disabled="${#lists.size(allCarriages) == 1}">

                <option value="">-- Chọn Toa --</option>

                <option th:each="carriage : ${allCarriages}"
                        th:value="${carriage.carriageId}"
                        th:text="|${carriage.train.code} - ${carriage.name} (${carriage.seatType != null ? carriage.seatType.name : 'N/A'})|">
                </option>

            </select>

            <input th:if="${#lists.size(allCarriages) == 1}"
                   type="hidden"
                   th:field="*{carriage}" />
        </div>

        <div>
            <label>Số Ghế (Seat Number)</label>

            <input type="text"
                   th:field="*{seatNumber}"
                   placeholder="Nhập số ghế (A1, A2...)"
                   required>
        </div>

        <div>
            <label>Trạng Thái Ghế (Ban đầu)</label>

            <select th:field="*{status}" required>
                <option th:each="s : ${seatStatusTypes}"
                        th:value="${s}"
                        th:text="${s}">
                </option>
            </select>
        </div>

        <div>
            <input type="checkbox" th:field="*{isActive}">
            <label>Kích Hoạt Ghế</label>
        </div>

        <div>
            <button type="submit">Lưu Ghế</button>

            <a th:href="@{/seats(carriageId=${selectedCarriageId})}">
                Hủy
            </a>
        </div>

    </form>

</div>
</body>
</html>
