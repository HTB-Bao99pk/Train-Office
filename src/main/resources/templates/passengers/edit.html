<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin-layout}">
<head>
    <title>Create Passenger</title>
</head>
<body>
<section layout:fragment="content" class="content-wrapper p-3">

    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="content-header">
        <div class="container-fluid">
            <h1>Create Passenger</h1>
            <small class="text-muted">Tạo hồ sơ hành khách</small>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="card card-primary card-outline">
                <form th:action="@{/admin/passengers/create}"
                      method="post"
                      th:object="${passengerForm}">

                    <div class="card-body">
                        <div class="mb-3">
                            <label for="userId" class="form-label">User Account / Tài khoản</label>
                            <select id="userId" th:field="*{userId}" class="form-select">
                                <option value="">-- Select User --</option>
                                <option th:each="user : ${users}"
                                        th:value="${user.userId}"
                                        th:text="${user.username}">
                                    customer01
                                </option>
                            </select>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('userId')}"
                                 th:errors="*{userId}">
                                User error
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="fullName" class="form-label">Full Name / Họ tên</label>
                            <input type="text"
                                   id="fullName"
                                   th:field="*{fullName}"
                                   class="form-control"
                                   placeholder="Enter full name">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('fullName')}"
                                 th:errors="*{fullName}">
                                Full name error
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="identityNumber" class="form-label">Identity Number / CCCD</label>
                            <input type="text"
                                   id="identityNumber"
                                   th:field="*{identityNumber}"
                                   class="form-control"
                                   placeholder="Enter identity number">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('identityNumber')}"
                                 th:errors="*{identityNumber}">
                                Identity error
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="dateOfBirth" class="form-label">Date of Birth / Ngày sinh</label>
                            <input type="date"
                                   id="dateOfBirth"
                                   th:field="*{dateOfBirth}"
                                   class="form-control">
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('dateOfBirth')}"
                                 th:errors="*{dateOfBirth}">
                                Date of birth error
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="gender" class="form-label">Gender / Giới tính</label>
                            <select id="gender" th:field="*{gender}" class="form-select">
                                <option value="">-- Select Gender --</option>
                                <option value="MALE">MALE</option>
                                <option value="FEMALE">FEMALE</option>
                                <option value="OTHER">OTHER</option>
                            </select>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('gender')}"
                                 th:errors="*{gender}">
                                Gender error
                            </div>
                        </div>
                    </div>

                    <div class="card-footer d-flex justify-content-between">
                        <a th:href="@{/admin/passengers}" class="btn btn-secondary">
                            Cancel
                        </a>

                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Create Passenger
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </section>
</section>
</body>
</html>
