<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Passengers / Hành khách', ~{::section}, 'passengers')}">
<section>
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div>
<div class="row mb-3"><div th:replace="~{fragments/stat-card :: statCard('Total / Tổng', ${totalItems}, 'fas fa-list', ' bg-info', 'Passengers / Hành khách')}"></div><div th:replace="~{fragments/stat-card :: statCard('Active / Hoạt động', ${activeItems}, 'fas fa-check', ' bg-success', 'Current')}"></div><div th:replace="~{fragments/stat-card :: statCard('Pending / Chờ', ${pendingItems}, 'fas fa-clock', ' bg-warning', 'Need review')}"></div><div th:replace="~{fragments/stat-card :: statCard('Issues / Lỗi', ${issueItems}, 'fas fa-exclamation', ' bg-danger', 'Attention')}"></div></div>
<div class="card"><div class="card-header"><form th:action="@{'/admin/passengers'}" method="get" th:object="${filter}" class="row g-2"><div class="col-md-4"><input class="form-control" th:field="*{keyword}" placeholder="Search / Tìm kiếm"><div class="text-danger small" th:if="${#fields.hasErrors('keyword')}" th:errors="*{keyword}">Error</div></div><div class="col-md-3"><select class="form-control" th:field="*{status}"><option value="">All status</option><option value="ACTIVE">ACTIVE</option><option value="PENDING">PENDING</option><option value="INACTIVE">INACTIVE</option></select><div class="text-danger small" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">Error</div></div><div class="col-md-3"><button class="btn btn-primary w-100"><i class="fas fa-search"></i> Filter / Lọc</button></div><div class="col-md-2"><a class="btn btn-success w-100" th:href="@{'/admin/passengers/create'}"><i class="fas fa-plus"></i> Add</a></div></form></div><div class="card-body table-responsive p-0"><table class="table table-hover mb-0"><thead><tr><th>passengerId</th><th>user</th><th>fullName</th><th>identityNumber</th><th>dateOfBirth</th><th>gender</th><th>Status</th><th class="text-right">Actions</th></tr></thead><tbody><tr th:each="row : ${items}"><td th:text="${row.passengerId}">passengerId</td><td th:text="${row.user}">user</td><td th:text="${row.fullName}">fullName</td><td th:text="${row.identityNumber}">identityNumber</td><td th:text="${row.dateOfBirth}">dateOfBirth</td><td th:text="${row.gender}">gender</td><td><span th:replace="~{fragments/status-badge :: statusBadge(${row.status})}"></span></td><td class="text-right"><a class="btn btn-sm btn-info" th:href="@{'/admin/passengers/' + ${row.id}}"><i class="fas fa-eye"></i></a> <a class="btn btn-sm btn-warning" th:href="@{'/admin/passengers/' + ${row.id} + '/edit'}"><i class="fas fa-edit"></i></a> <button type="button" class="btn btn-sm btn-danger" data-toggle="modal" th:data-target="${'#deleteModal' + row.id}"><i class="fas fa-trash"></i></button><div class="modal fade" th:id="${'deleteModal' + row.id}" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Confirm / Xác nhận</h5><button type="button" class="close" data-dismiss="modal">&times;</button></div><div class="modal-body">Delete this item? / Xóa mục này?</div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button><form th:action="@{'/admin/passengers/delete'}" method="post"><button class="btn btn-danger">Delete / Xóa</button></form></div></div></div></div></td></tr><tr th:if="${#lists.isEmpty(items)}"><td colspan="12" class="text-center text-muted py-4">No data / Chưa có dữ liệu</td></tr></tbody></table></div><div class="card-footer"><div th:replace="~{fragments/pagination :: pagination(${page})}"></div></div></div>
</section>
</html>
