<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout('Passengers', ~{::section}, 'passengers')}">
<section>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0">Passengers</h2>
        <a class="btn btn-primary" th:href="@{/admin/passengers/new}">
            <i class="fas fa-plus mr-1"></i> Add passenger
        </a>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-header">
            <form class="row g-2" method="get" th:action="@{/admin/passengers}">
                <div class="col-md-10">
                    <input class="form-control" name="keyword" th:value="${keyword}" placeholder="Search full name or identity number">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-primary w-100" type="submit">
                        <i class="fas fa-search mr-1"></i> Search
                    </button>
                </div>
            </form>
        </div>
        <div class="card-body table-responsive p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Full name</th>
                    <th>Identity number</th>
                    <th>Date of birth</th>
                    <th>Gender</th>
                    <th>Booking</th>
                    <th class="text-right">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="passenger : ${passengers}">
                    <td th:text="${passenger.passengerId}">1</td>
                    <td th:text="${passenger.fullName}">Passenger</td>
                    <td th:text="${passenger.identityNumber ?: '-'}">-</td>
                    <td th:text="${passenger.dateOfBirth != null ? #temporals.format(passenger.dateOfBirth, 'dd/MM/yyyy') : '-'}">-</td>
                    <td th:text="${passenger.gender ?: '-'}">-</td>
                    <td th:text="${passenger.booking != null ? passenger.booking.bookingNumber : '-'}">-</td>
                    <td class="text-right">
                        <a class="btn btn-sm btn-info" th:href="@{/admin/passengers/{id}(id=${passenger.passengerId})}">
                            <i class="fas fa-eye"></i>
                        </a>
                        <a class="btn btn-sm btn-warning" th:href="@{/admin/passengers/edit/{id}(id=${passenger.passengerId})}">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a class="btn btn-sm btn-danger"
                           th:href="@{/admin/passengers/delete/{id}(id=${passenger.passengerId})}"
                           onclick="return confirm('Delete this passenger?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(passengers)}">
                    <td colspan="7" class="text-center text-muted py-4">No passengers found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</html>
