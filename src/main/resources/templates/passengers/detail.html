<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin-layout}">
<head>
    <title>Passenger Detail</title>
</head>
<body>
<section layout:fragment="content" class="content-wrapper p-3">

    <div th:replace="~{fragments/toast :: toast}"></div>

    <div class="content-header">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div>
                <h1>Passenger Detail</h1>
                <small class="text-muted">Thông tin hành khách</small>
            </div>

            <div>
                <a th:href="@{/admin/passengers}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <a th:href="@{/admin/passengers/{id}/edit(id=${passenger.passengerId})}"
                   class="btn btn-warning">
                    <i class="fas fa-edit"></i> Edit
                </a>
            </div>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="card card-primary card-outline">
                <div class="card-header">
                    <h3 class="card-title">
                        <i class="fas fa-id-card"></i>
                        <span th:text="${passenger.fullName}">Nguyen Van A</span>
                    </h3>
                </div>

                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-3">Passenger ID</dt>
                        <dd class="col-sm-9" th:text="${passenger.passengerId}">1</dd>

                        <dt class="col-sm-3">User Account</dt>
                        <dd class="col-sm-9"
                            th:text="${passenger.user != null ? passenger.user.username : 'N/A'}">
                            customer01
                        </dd>

                        <dt class="col-sm-3">Full Name</dt>
                        <dd class="col-sm-9" th:text="${passenger.fullName}">Nguyen Van A</dd>

                        <dt class="col-sm-3">Identity Number</dt>
                        <dd class="col-sm-9" th:text="${passenger.identityNumber}">012345678901</dd>

                        <dt class="col-sm-3">Date of Birth</dt>
                        <dd class="col-sm-9"
                            th:text="${#temporals.format(passenger.dateOfBirth, 'dd/MM/yyyy')}">
                            01/01/2000
                        </dd>

                        <dt class="col-sm-3">Gender</dt>
                        <dd class="col-sm-9">
                            <span class="badge bg-info" th:text="${passenger.gender}">
                                MALE
                            </span>
                        </dd>
                    </dl>
                </div>

                <div class="card-footer text-end">
                    <button type="button"
                            class="btn btn-danger"
                            data-bs-toggle="modal"
                            data-bs-target="#deletePassengerModal">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>

            <div class="modal fade" id="deletePassengerModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Delete Passenger</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="modal-body">
                            Are you sure you want to delete
                            <strong th:text="${passenger.fullName}">Nguyen Van A</strong>?
                        </div>

                        <div class="modal-footer">
                            <button type="button"
                                    class="btn btn-secondary"
                                    data-bs-dismiss="modal">
                                Cancel
                            </button>

                            <form th:action="@{/admin/passengers/{id}/delete(id=${passenger.passengerId})}"
                                  method="post">
                                <button type="submit" class="btn btn-danger">
                                    Delete
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </section>
</section>
</body>
</html>
