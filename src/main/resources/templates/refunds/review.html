<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Review Refund / Duyệt hoàn tiền', ~{::section}, 'refunds')}">
<section>
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div><div class="card"><div class="card-header">Review / Duyệt Refund review</div><form th:action="@{'/admin/refunds/save'}" method="post" th:object="${form}"><div class="card-body"><div th:replace="~{fragments/form-errors :: globalErrors}"></div><div class="row g-3"><div class="col-md-6"><label class="form-label">refundId</label><input class="form-control" th:field="*{refundId}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('refundId')}" th:errors="*{refundId}">Error</div></div>
<div class="col-md-6"><label class="form-label">refundCode</label><input class="form-control" th:field="*{refundCode}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('refundCode')}" th:errors="*{refundCode}">Error</div></div>
<div class="col-md-6"><label class="form-label">refundAmount</label><input class="form-control" th:field="*{refundAmount}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('refundAmount')}" th:errors="*{refundAmount}">Error</div></div>
<div class="col-md-6"><label class="form-label">refundReason</label><input class="form-control" th:field="*{refundReason}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('refundReason')}" th:errors="*{refundReason}">Error</div></div>
<div class="col-md-6"><label class="form-label">refundStatus</label><input class="form-control" th:field="*{refundStatus}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('refundStatus')}" th:errors="*{refundStatus}">Error</div></div></div></div><div class="card-footer d-flex justify-content-between"><a class="btn btn-secondary" th:href="@{'/admin/refunds'}">Back / Quay lại</a><button class="btn btn-primary">Save / Lưu</button></div></form></div>
</section>
</html>
