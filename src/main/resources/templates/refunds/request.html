<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/customer-layout :: layout('Yêu cầu hoàn tiền', ~{::section}, 'tickets')}">
<section class="container customer-page">
    <div class="page-hero">
        <span class="page-eyebrow">Hoàn tiền</span>
        <h1 class="page-title">Gửi yêu cầu hoàn tiền</h1>
        <p class="page-subtitle">Nhập lý do để bộ phận vận hành xem xét yêu cầu của bạn.</p>
    </div>

    <form th:action="@{/refunds/request}" method="post" th:object="${form}">
        <div class="railjet-card card">
            <div class="card-body p-4">
                <label class="form-label">Lý do hoàn tiền</label>
                <textarea class="form-control" rows="5" th:field="*{refundReason}" placeholder="Nhập lý do..."></textarea>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('refundReason')}" th:errors="*{refundReason}">Error</div>
                <button class="btn btn-primary mt-3">Gửi yêu cầu</button>
            </div>
        </div>
    </form>
</section>
</html>
