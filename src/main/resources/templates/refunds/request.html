<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/customer-layout :: layout('Refund Request / Yêu cầu hoàn tiền', ~{::section}, 'payments')}">
<section class="container">
<form th:action="@{/refunds/request}" method="post" th:object="${form}"><div class="railjet-card card"><div class="card-header">Refund request / Yêu cầu hoàn tiền</div><div class="card-body"><label>Reason / Lý do</label><textarea class="form-control" rows="4" th:field="*{refundReason}"></textarea><div class="text-danger small" th:if="${#fields.hasErrors('refundReason')}" th:errors="*{refundReason}">Error</div><button class="btn btn-primary mt-3">Submit / Gửi</button></div></div></form>
</section>
</html>
