<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, content, activeMenu)">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' | RailJet Admin'">RailJet Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin-custom.css}">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <div th:replace="~{fragments/admin-header :: adminHeader}"></div>
    <div th:replace="~{fragments/admin-sidebar :: adminSidebar(${activeMenu})}"></div>
    <div class="content-wrapper">
        <section class="content-header"><div class="container-fluid"><h1 th:text="${pageTitle}">Dashboard</h1></div></section>
        <section class="content"><div class="container-fluid"><div th:replace="${content}"></div></div></section>
    </div>
    <div th:replace="~{fragments/admin-footer :: adminFooter}"></div>
</div>
<div th:replace="~{fragments/toast :: toast}"></div>
<div th:replace="~{fragments/modal :: modal}"></div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
