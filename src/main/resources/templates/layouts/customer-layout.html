<!-- templates/layouts/customer-layout.html -->
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, content, activeMenu)">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' | RailJet'">RailJet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/customer.css}">
</head>
<body>

<div th:replace="~{fragments/customer-header :: customerHeader(${activeMenu})}"></div>

<main class="railjet-main">
    <div th:replace="${content}"></div>
</main>

<div th:replace="~{fragments/customer-footer :: customerFooter}"></div>
<div th:replace="~{fragments/toast :: toast}"></div>
<div th:replace="~{fragments/modal :: modal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
