<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout('Route Station Form', ~{::section}, 'routes')}">
<section>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1">Route Station Form</h2>
            <div class="text-muted">
                <span th:text="${route.routeCode}">HN-SG</span>
                -
                <span th:text="${route.routeName}">Ha Noi - Sai Gon</span>
            </div>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/admin/routes/{routeId}/stations(routeId=${route.routeId})}">
            Back
        </a>
    </div>

    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-body">
            <form th:action="${formAction}" th:object="${routeStation}" method="post">
                <div class="mb-3">
                    <label class="form-label" for="station">Station</label>
                    <select id="station" class="form-select" name="station.stationId" required>
                        <option value="">Select station</option>
                        <option th:each="station : ${stations}"
                                th:value="${station.stationId}"
                                th:selected="${routeStation.station != null and routeStation.station.stationId == station.stationId}"
                                th:text="${station.stationCode + ' - ' + station.stationName + ' (' + station.city + ')'}">
                            HN - Ha Noi
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="stationOrder">Station Order</label>
                    <input id="stationOrder" class="form-control" type="number" min="1"
                           th:field="*{stationOrder}" required>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a class="btn btn-outline-secondary"
                       th:href="@{/admin/routes/{routeId}/stations(routeId=${route.routeId})}">
                        Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</section>
</html>
