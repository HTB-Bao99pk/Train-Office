<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout('Route Form', ~{::section}, 'routes')}">
<section>
    <div class="admin-page-hero">
        <div>
            <span class="admin-page-kicker"><i class="fas fa-route mr-1"></i> Route Profile</span>
            <h2 th:text="${route.routeId == null ? 'Create Route' : 'Update Route'}">Route Form</h2>
            <p>Set the route identity before arranging stations in travel order.</p>
        </div>
        <a th:href="@{/admin/routes}" class="btn btn-outline-primary">
            <i class="fas fa-arrow-left mr-1"></i> Back to routes
        </a>
    </div>

    <div class="card admin-form-card">
        <div class="card-header">
            <span class="admin-card-title">Route Information</span>
            <small>Use a clear route code and total distance in kilometers.</small>
        </div>
        <form th:action="@{/admin/routes/save}" th:object="${route}" method="post">
            <input type="hidden" th:field="*{routeId}">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Route Code</label>
                        <div class="input-group">
                            <div class="input-group-prepend"><span class="input-group-text"><i class="fas fa-hashtag"></i></span></div>
                            <input class="form-control" th:field="*{routeCode}">
                        </div>
                    </div>
                    <div class="col-md-5 mb-3">
                        <label class="form-label">Route Name</label>
                        <div class="input-group">
                            <div class="input-group-prepend"><span class="input-group-text"><i class="fas fa-map-signs"></i></span></div>
                            <input class="form-control" th:field="*{routeName}">
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Distance (km)</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
            <span class="input-group-text">
                <i class="fas fa-road"></i>
            </span>
                            </div>

                            <input type="number"
                                   step="0.1"
                                   class="form-control"
                                   th:field="*{distanceKm}"
                                   readonly>
                        </div>

                        <small class="form-text text-muted">
                            Auto-calculated from route stations.
                        </small>
                    </div>
                </div>
            </div>
            <div class="card-footer d-flex justify-content-end gap-2">
                <a th:href="@{/admin/routes}" class="btn btn-outline-secondary">Cancel</a>
                <button class="btn btn-primary" type="submit">
                    <i class="fas fa-save mr-1"></i> Save Route
                </button>
            </div>
        </form>
    </div>
</section>
</html>
