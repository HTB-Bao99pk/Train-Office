<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Create Routes / Tuyến', ~{::section}, 'routes')}">
<section>
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div><div class="card"><div class="card-header">Create / Tạo Routes / Tuyến</div><form th:action="@{'/admin/routes/save'}" method="post" th:object="${form}"><div class="card-body"><div th:replace="~{fragments/form-errors :: globalErrors}"></div><div class="row g-3"><div class="col-md-6"><label class="form-label">routeId</label><input class="form-control" th:field="*{routeId}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('routeId')}" th:errors="*{routeId}">Error</div></div>
<div class="col-md-6"><label class="form-label">routeCode</label><input class="form-control" th:field="*{routeCode}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('routeCode')}" th:errors="*{routeCode}">Error</div></div>
<div class="col-md-6"><label class="form-label">routeName</label><input class="form-control" th:field="*{routeName}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('routeName')}" th:errors="*{routeName}">Error</div></div>
<div class="col-md-6"><label class="form-label">distanceKm</label><input class="form-control" th:field="*{distanceKm}"><div class="text-danger small mt-1" th:if="${#fields.hasErrors('distanceKm')}" th:errors="*{distanceKm}">Error</div></div></div></div><div class="card-footer d-flex justify-content-between"><a class="btn btn-secondary" th:href="@{'/admin/routes'}">Back / Quay lại</a><button class="btn btn-primary">Save / Lưu</button></div></form></div>
</section>
</html>
