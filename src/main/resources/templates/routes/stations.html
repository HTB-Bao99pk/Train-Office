<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/admin-layout :: layout('Route Stations', ~{::section}, 'routes')}">
<section>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1">Route Stations</h2>
            <div class="text-muted">
                <span th:text="${route.routeCode}">HN-SG</span>
                -
                <span th:text="${route.routeName}">Ha Noi - Sai Gon</span>
            </div>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/admin/routes}">Back to Routes</a>
            <a class="btn btn-primary" th:href="@{/admin/routes/{routeId}/stations/new(routeId=${route.routeId})}">
                Add Station
            </a>
        </div>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-body table-responsive p-0">
            <table class="table table-bordered table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th width="100">Order</th>
                    <th>Station Code</th>
                    <th>Station Name</th>
                    <th>City</th>
                    <th width="180">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="routeStation : ${routeStations}">
                    <td th:text="${routeStation.stationOrder}">1</td>
                    <td th:text="${routeStation.station != null ? routeStation.station.stationCode : ''}">HN</td>
                    <td th:text="${routeStation.station != null ? routeStation.station.stationName : ''}">Ha Noi</td>
                    <td th:text="${routeStation.station != null ? routeStation.station.city : ''}">Ha Noi</td>
                    <td>
                        <a class="btn btn-warning btn-sm"
                           th:href="@{/admin/routes/{routeId}/stations/edit/{id}(routeId=${route.routeId},id=${routeStation.routeStationId})}">
                            Edit
                        </a>
                        <a class="btn btn-danger btn-sm"
                           onclick="return confirm('Remove this station from route?')"
                           th:href="@{/admin/routes/{routeId}/stations/delete/{id}(routeId=${route.routeId},id=${routeStation.routeStationId})}">
                            Delete
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(routeStations)}">
                    <td colspan="5" class="text-center text-muted py-4">
                        No stations have been added to this route.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</html>
