<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/admin-layout :: layout('Route Stations / Ga trên tuyến', ~{::section}, 'routes')}">
<section>
<div th:replace="~{fragments/breadcrumb :: breadcrumb(${breadcrumbs})}"></div>
<div class="card"><div class="card-header"><form th:action="@{/admin/routes/1/stations}" method="get" th:object="${filter}" class="row g-2"><div class="col-md-4"><input class="form-control" th:field="*{keyword}" placeholder="Search station / Tìm ga"><div class="text-danger small" th:if="${#fields.hasErrors('keyword')}" th:errors="*{keyword}">Error</div></div><div class="col-md-3"><button class="btn btn-primary w-100">Filter / Lọc</button></div></form></div><div class="card-body table-responsive p-0"><table class="table table-hover mb-0"><thead><tr><th>routeStationId</th><th>route</th><th>station</th><th>stationOrder</th><th>Status</th><th class="text-right">Actions</th></tr></thead><tbody><tr th:each="row : ${items}"><td th:text="${row.routeStationId}">1</td><td th:text="${row.route}">Route</td><td th:text="${row.station}">Station</td><td th:text="${row.stationOrder}">1</td><td><span th:replace="~{fragments/status-badge :: statusBadge(${row.status})}"></span></td><td class="text-right"><button class="btn btn-sm btn-danger" data-toggle="modal" data-target="#deleteRouteStation"><i class="fas fa-trash"></i></button></td></tr></tbody></table></div><div class="card-footer"><div th:replace="~{fragments/pagination :: pagination(${page})}"></div></div></div><div class="modal fade" id="deleteRouteStation" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Confirm / Xác nhận</h5><button class="close" data-dismiss="modal">&times;</button></div><div class="modal-body">Delete route station? / Xóa ga khỏi tuyến?</div><div class="modal-footer"><button class="btn btn-secondary" data-dismiss="modal">Cancel</button><form th:action="@{/admin/routes/stations/delete}" method="post"><button class="btn btn-danger">Delete</button></form></div></div></div></div>
</section>
</html>
